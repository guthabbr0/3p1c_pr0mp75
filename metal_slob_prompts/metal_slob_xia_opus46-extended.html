<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metal Slob xIA</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Courier New', monospace; }
canvas { display: block; image-rendering: pixelated; }
#overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  z-index: 100; pointer-events: none; color: #fff;
  font-family: 'Courier New', monospace; text-align: center;
}
#overlay.active { pointer-events: all; }
#hud {
  position: fixed; top: 0; left: 0; width: 100%; padding: 8px 16px;
  z-index: 50; display: none; font-family: 'Courier New', monospace;
  color: #fff; font-size: 14px;
}
.hud-row { display: flex; justify-content: space-between; align-items: center; }
.health-bar-bg { width: 200px; height: 18px; background: #333; border: 2px solid #888; position: relative; }
.health-bar-fg { height: 100%; background: #f00; transition: width 0.1s; }
#ammo-counter {
  font-size: 28px; font-weight: bold; color: #0f0;
  text-shadow: 0 0 8px #0f0; transition: color 0.1s;
}
#progress-bar-bg { width: 100%; height: 6px; background: #222; margin-top: 4px; border: 1px solid #555; }
#progress-bar-fg { height: 100%; background: #0af; width: 0%; }
.shake { animation: shake 0.05s infinite; }
@keyframes shake {
  0% { transform: translate(0); }
  25% { transform: translate(-3px, 2px); }
  50% { transform: translate(3px, -2px); }
  75% { transform: translate(-2px, -3px); }
  100% { transform: translate(2px, 3px); }
}
@keyframes blink { 0%,49%{opacity:1}50%,100%{opacity:0} }
.blink { animation: blink 0.5s infinite; }
#title-label {
  position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
  z-index: 51; font-family: 'Courier New', monospace; font-size: 11px;
  color: #ff0; text-shadow: 0 0 6px #ff0; letter-spacing: 3px; display: none;
}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="title-label">METAL SLOB xIA</div>
<div id="hud">
  <div class="hud-row">
    <div>
      <div style="font-size:10px;color:#aaa;">ALECK BLACK</div>
      <div class="health-bar-bg"><div class="health-bar-fg" id="health-bar" style="width:100%"></div></div>
    </div>
    <div style="text-align:center;">
      <div style="font-size:10px;color:#aaa;">AMMO</div>
      <div id="ammo-counter">69</div>
    </div>
    <div style="text-align:right;">
      <div style="font-size:10px;color:#aaa;">KILLS</div>
      <div id="kill-counter" style="font-size:20px;color:#f80;text-shadow:0 0 6px #f80;">0</div>
    </div>
  </div>
  <div id="progress-bar-bg"><div id="progress-bar-fg"></div></div>
</div>
<div id="overlay" class="active"></div>

<script>
// ==================== AUDIO ENGINE ====================
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let actx;
function ensureAudio() {
  if (!actx) actx = new AudioCtx();
  if (actx.state === 'suspended') actx.resume();
}

function playTone(freq, dur, type='square', vol=0.15, detune=0) {
  if (!actx) return;
  const o = actx.createOscillator();
  const g = actx.createGain();
  o.type = type;
  o.frequency.value = freq;
  o.detune.value = detune;
  g.gain.setValueAtTime(vol, actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + dur);
  o.connect(g); g.connect(actx.destination);
  o.start(); o.stop(actx.currentTime + dur);
}

function playNoise(dur, vol=0.1) {
  if (!actx) return;
  const buf = actx.createBuffer(1, actx.sampleRate * dur, actx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1);
  const src = actx.createBufferSource();
  src.buffer = buf;
  const g = actx.createGain();
  g.gain.setValueAtTime(vol, actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + dur);
  const f = actx.createBiquadFilter();
  f.type = 'highpass'; f.frequency.value = 800;
  src.connect(f); f.connect(g); g.connect(actx.destination);
  src.start(); src.stop(actx.currentTime + dur);
}

function sfxRifle() {
  playNoise(0.08, 0.25);
  playTone(180, 0.05, 'square', 0.2);
  playTone(90, 0.03, 'sawtooth', 0.15);
}

function sfxReload() {
  playTone(600, 0.1, 'triangle', 0.15);
  setTimeout(() => playTone(800, 0.15, 'triangle', 0.12), 150);
  setTimeout(() => playTone(1000, 0.1, 'triangle', 0.1), 350);
}

function sfxKnife() {
  playNoise(0.06, 0.2);
  playTone(2000, 0.06, 'sawtooth', 0.12);
  playTone(3000, 0.04, 'square', 0.08);
}

function sfxKnifeHit() {
  playNoise(0.12, 0.3);
  playTone(100, 0.15, 'sawtooth', 0.2);
  playTone(60, 0.2, 'square', 0.15);
}

function sfxEnemyShoot() {
  playNoise(0.05, 0.1);
  playTone(300, 0.04, 'square', 0.08);
}

function sfxCoin() {
  playTone(1200, 0.08, 'square', 0.12);
  setTimeout(() => playTone(1600, 0.12, 'square', 0.1), 60);
  setTimeout(() => playTone(2000, 0.08, 'triangle', 0.08), 120);
}

function sfxExplosion() {
  playNoise(0.4, 0.35);
  playTone(60, 0.3, 'sawtooth', 0.25);
  playTone(40, 0.5, 'square', 0.15);
}

function sfxSlideYell() {
  const freqs = [300, 500, 700, 900, 800, 600];
  freqs.forEach((f, i) => {
    setTimeout(() => {
      playTone(f, 0.08, 'sawtooth', 0.18);
      playTone(f * 1.01, 0.08, 'square', 0.1);
    }, i * 50);
  });
}

function sfxEnemyYell(type) {
  const base = 200 + Math.random() * 100;
  if (type === 0) { // attack
    playTone(base, 0.15, 'sawtooth', 0.12);
    playTone(base * 1.5, 0.1, 'square', 0.08);
  } else if (type === 1) { // swear
    playTone(base * 0.8, 0.2, 'sawtooth', 0.14);
    setTimeout(() => playTone(base * 1.2, 0.12, 'square', 0.1), 100);
    setTimeout(() => playTone(base * 0.6, 0.15, 'sawtooth', 0.12), 200);
  } else { // death
    playTone(base, 0.3, 'sawtooth', 0.2);
    playTone(base * 0.5, 0.4, 'square', 0.15);
    setTimeout(() => playTone(base * 0.3, 0.3, 'sawtooth', 0.1), 150);
  }
}

function sfxAnnouncer(word) {
  // deep voice simulation
  const base = 100 + Math.random() * 30;
  for (let i = 0; i < word.length && i < 8; i++) {
    const f = base + (word.charCodeAt(i % word.length) - 60) * 2;
    setTimeout(() => {
      playTone(f, 0.12, 'sawtooth', 0.2);
      playTone(f * 0.5, 0.12, 'square', 0.1);
    }, i * 80);
  }
}

function sfxSiren() {
  if (!actx) return;
  const o = actx.createOscillator();
  const g = actx.createGain();
  o.type = 'sawtooth';
  o.frequency.setValueAtTime(200, actx.currentTime);
  o.frequency.linearRampToValueAtTime(800, actx.currentTime + 0.5);
  o.frequency.linearRampToValueAtTime(200, actx.currentTime + 1.0);
  o.frequency.linearRampToValueAtTime(800, actx.currentTime + 1.5);
  o.frequency.linearRampToValueAtTime(200, actx.currentTime + 2.0);
  g.gain.setValueAtTime(0.4, actx.currentTime);
  g.gain.setValueAtTime(0.4, actx.currentTime + 2.0);
  g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 2.5);
  o.connect(g); g.connect(actx.destination);
  o.start(); o.stop(actx.currentTime + 2.5);
}

// Background music engine
let musicInterval;
function startMusic() {
  if (musicInterval) return;
  const bassLine = [60, 60, 72, 60, 55, 60, 67, 65];
  const melLine =  [240, 320, 360, 300, 280, 360, 400, 320];
  let beat = 0;
  musicInterval = setInterval(() => {
    if (!actx) return;
    const b = bassLine[beat % bassLine.length];
    const m = melLine[beat % melLine.length];
    playTone(b, 0.12, 'square', 0.06);
    playTone(b * 2, 0.08, 'triangle', 0.03);
    if (beat % 2 === 0) playTone(m, 0.1, 'square', 0.04);
    if (beat % 4 === 0) playNoise(0.05, 0.08); // kick
    if (beat % 4 === 2) playNoise(0.03, 0.06); // snare
    if (beat % 2 === 1) { // hi hat
      playNoise(0.02, 0.04);
    }
    beat++;
  }, 150);
}

function stopMusic() {
  clearInterval(musicInterval);
  musicInterval = null;
}

// ==================== GAME CONSTANTS ====================
const W = 800, H = 450;
const GROUND_Y = 360;
const GRAVITY = 0.6;
const PLAYER_SPEED = 3;
const BULLET_SPEED = 10;
const ENEMY_BULLET_SPEED = 4;
const MAX_AMMO = 69;
const RELOAD_TIME = 1200; // ms
const PLAYER_MAX_HP = 100;
const ENEMY_HP = 10;
const LEVEL_LENGTH = 8000; // pixels to win
const FIRE_RATE = 80; // ms between shots

// ==================== CANVAS SETUP ====================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = W;
canvas.height = H;

// ==================== GAME STATE ====================
let gameState = 'INTRO'; // INTRO, COUNTDOWN, PLAYING, GAMEOVER, WIN
let introSeqState = 0; // 0=waiting L, 1=waiting R, 2=waiting Space
let countdownTimer = 0;
let countdownStart = 0;

let keys = {};
let player, bullets, enemies, enemyBullets, particles, loots, camera;
let kills = 0, comboKills = 0, comboTimer = 0;
let lastFireTime = 0, reloading = false, reloadStart = 0;
let shakeX = 0, shakeY = 0, shakeDur = 0;
let levelProgress = 0;
let gameOverPresses = 0, winPresses = 0;
let lastTime = 0;
let introOffset = 0;
let announcerQueue = [];
const announcements = ['HEADSHOT!', 'ANNIHILATION!', 'BRUTAL!', 'UNSTOPPABLE!', 'MASSACRE!', 'CARNAGE!', 'OVERKILL!'];

// ==================== SPRITE DRAWING ====================
// All sprites drawn procedurally on canvas

function drawPixelRect(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(Math.floor(x), Math.floor(y), w, h);
}

// Aleck Black - mercenary sprite
function drawAleck(x, y, frame, dir, state) {
  ctx.save();
  ctx.translate(x, y);
  if (dir < 0) { ctx.scale(-1, 1); }
  const s = 2; // pixel scale

  if (state === 'parachute') {
    // Parachute
    ctx.fillStyle = '#e44';
    ctx.beginPath();
    ctx.ellipse(0, -40, 20, 15, 0, Math.PI, 0);
    ctx.fill();
    ctx.strokeStyle = '#a22';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-15, -28); ctx.lineTo(-4, -5);
    ctx.moveTo(15, -28); ctx.lineTo(4, -5);
    ctx.moveTo(-8, -30); ctx.lineTo(-1, -5);
    ctx.moveTo(8, -30); ctx.lineTo(1, -5);
    ctx.stroke();
  }

  // Skin color
  const skin = '#5a3a1a';
  const darkSkin = '#3d2610';
  const shirt = '#1a4a1a';
  const pants = '#2a2a3a';
  const boots = '#222';
  const hair = '#111';
  const bandana = '#c22';

  // Head
  drawPixelRect(-4*s, -24*s, 8*s, 8*s, skin);
  drawPixelRect(-5*s, -24*s, 10*s, 3*s, bandana);
  drawPixelRect(-3*s, -22*s, 2*s, 2*s, '#fff'); // eye white
  drawPixelRect(-2*s, -21*s, s, s, '#000'); // pupil
  drawPixelRect(1*s, -22*s, 2*s, 2*s, '#fff');
  drawPixelRect(2*s, -21*s, s, s, '#000');
  drawPixelRect(-1*s, -19*s, 2*s, s, darkSkin); // nose
  drawPixelRect(-2*s, -17*s, 4*s, s, '#833'); // mouth

  // Body / torso
  drawPixelRect(-5*s, -16*s, 10*s, 10*s, shirt);
  // Belt
  drawPixelRect(-5*s, -7*s, 10*s, 2*s, '#654');
  drawPixelRect(-1*s, -7*s, 2*s, 2*s, '#ff0'); // buckle

  // Legs with run animation
  const legOff = state === 'run' ? Math.sin(frame * 0.8) * 3 * s : 0;
  const legOff2 = -legOff;
  drawPixelRect(-4*s, -5*s + legOff, 3*s, 8*s, pants);
  drawPixelRect(1*s, -5*s + legOff2, 3*s, 8*s, pants);
  // Boots
  drawPixelRect(-4*s, 3*s + legOff, 4*s, 3*s, boots);
  drawPixelRect(1*s, 3*s + legOff2, 4*s, 3*s, boots);

  // Arms & gun
  if (state === 'knife') {
    // Knife arm extended
    const kf = frame % 6;
    const kAngle = kf < 3 ? -0.8 + kf * 0.5 : 0.7 - (kf - 3) * 0.5;
    ctx.save();
    ctx.translate(5*s, -13*s);
    ctx.rotate(kAngle);
    drawPixelRect(0, 0, 12*s, 2*s, '#aaa'); // blade
    drawPixelRect(-2*s, -s, 3*s, 4*s, '#654'); // handle
    ctx.restore();
    // Other arm
    drawPixelRect(-6*s, -15*s, 2*s, 8*s, skin);
  } else if (state === 'slide') {
    // Sliding pose - flat
    drawPixelRect(-5*s, -8*s, 14*s, 4*s, shirt);
    drawPixelRect(6*s, -10*s, 8*s, 2*s, '#888'); // gun forward
  } else {
    // Gun arm
    drawPixelRect(5*s, -14*s, 2*s, 6*s, skin);
    drawPixelRect(6*s, -16*s, 10*s, 3*s, '#888'); // rifle
    drawPixelRect(15*s, -17*s, 2*s, 5*s, '#666'); // barrel tip
    // Off arm
    drawPixelRect(-6*s, -15*s, 2*s, 6*s, skin);
    drawPixelRect(-7*s, -14*s, 2*s, 4*s, shirt);
  }

  ctx.restore();
}

function drawEnemy(x, y, frame, dir, hp, maxHp, dying, deathFrame) {
  ctx.save();
  ctx.translate(x, y);
  if (dir < 0) ctx.scale(-1, 1);
  const s = 2;

  if (dying) {
    ctx.globalAlpha = deathFrame % 4 < 2 ? 0.4 : 0.8;
    // Collapse effect
    const collapse = Math.min(deathFrame * 0.5, 8);
    ctx.translate(0, collapse);
    ctx.rotate(deathFrame * 0.05);
  }

  const skin = '#7a8a7a'; // slightly alien greenish
  const helmet = '#3a4a3a';
  const uniform = '#4a5a3a';
  const boots = '#2a2a2a';

  // Head with helmet
  drawPixelRect(-3*s, -22*s, 6*s, 6*s, skin);
  drawPixelRect(-4*s, -23*s, 8*s, 4*s, helmet);
  drawPixelRect(-2*s, -19*s, 2*s, s, '#f00'); // alien red eye
  drawPixelRect(1*s, -19*s, 2*s, s, '#f00');
  drawPixelRect(-1*s, -17*s, 2*s, s, '#555');

  // Body
  drawPixelRect(-4*s, -16*s, 8*s, 10*s, uniform);

  // Legs
  const legOff = Math.sin(frame * 0.6) * 2 * s;
  drawPixelRect(-3*s, -6*s + legOff, 3*s, 7*s, uniform);
  drawPixelRect(1*s, -6*s - legOff, 3*s, 7*s, uniform);
  drawPixelRect(-3*s, 1*s + legOff, 3*s, 3*s, boots);
  drawPixelRect(1*s, 1*s - legOff, 3*s, 3*s, boots);

  // Gun
  drawPixelRect(4*s, -14*s, 8*s, 2*s, '#666');

  ctx.restore();
}

// ==================== PARTICLES ====================
function spawnParticles(x, y, color, count, speed, life) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * speed,
      vy: (Math.random() - 0.8) * speed,
      life: life * (0.5 + Math.random() * 0.5),
      maxLife: life,
      color,
      size: 1 + Math.random() * 3
    });
  }
}

function spawnMuzzleFlash(x, y, dir) {
  for (let i = 0; i < 5; i++) {
    particles.push({
      x: x + dir * 20, y: y - 10 + Math.random() * 4,
      vx: dir * (3 + Math.random() * 5),
      vy: (Math.random() - 0.5) * 2,
      life: 4 + Math.random() * 3,
      maxLife: 8,
      color: ['#ff0', '#fa0', '#fff'][Math.floor(Math.random() * 3)],
      size: 2 + Math.random() * 3
    });
  }
}

function spawnShell(x, y, dir) {
  particles.push({
    x, y: y - 15,
    vx: -dir * (1 + Math.random() * 2),
    vy: -(2 + Math.random() * 3),
    life: 40,
    maxLife: 40,
    color: '#da0',
    size: 2,
    gravity: true
  });
}

function spawnGreenBlood(x, y) {
  spawnParticles(x, y, '#0f0', 8, 5, 20);
  spawnParticles(x, y, '#0a0', 5, 3, 15);
  spawnParticles(x, y, '#4f4', 3, 4, 18);
}

function spawnRedBlood(x, y) {
  spawnParticles(x, y, '#f00', 3, 3, 12);
  spawnParticles(x, y, '#a00', 2, 2, 10);
}

// ==================== LOOT ====================
function spawnLoot(x, y) {
  loots.push({
    x, y: y - 10,
    vy: -3,
    life: 300,
    sparkle: 0,
    collected: false
  });
}

// ==================== INIT ====================
function initGame() {
  player = {
    x: 200, y: GROUND_Y, vy: 0, dir: 1,
    hp: PLAYER_MAX_HP, ammo: MAX_AMMO,
    state: 'idle', frame: 0,
    sliding: false, slideTimer: 0, slideDir: 1,
    knifing: false, knifeTimer: 0,
    invuln: 0, onGround: true
  };
  bullets = [];
  enemies = [];
  enemyBullets = [];
  particles = [];
  loots = [];
  camera = { x: 0 };
  kills = 0;
  comboKills = 0;
  comboTimer = 0;
  lastFireTime = 0;
  reloading = false;
  reloadStart = 0;
  levelProgress = 0;
  gameOverPresses = 0;
  winPresses = 0;

  // Spawn initial enemies
  for (let i = 0; i < 4; i++) spawnEnemy();
}

function spawnEnemy() {
  const side = Math.random() < 0.5 ? -1 : 1;
  const ex = player.x + side * (W / 2 + 30 + Math.random() * 100);
  enemies.push({
    x: ex, y: GROUND_Y, vy: 0,
    hp: ENEMY_HP, dir: ex > player.x ? -1 : 1,
    frame: Math.random() * 100,
    shootTimer: 60 + Math.random() * 120,
    yellTimer: 120 + Math.random() * 300,
    dying: false, deathFrame: 0,
    onGround: true
  });
}

// ==================== PARALLAX LAYERS ====================
function drawParallax() {
  const cx = camera.x;

  // Sky gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#0a0a2a');
  grad.addColorStop(0.4, '#1a1040');
  grad.addColorStop(0.7, '#2a1530');
  grad.addColorStop(1, '#1a0a0a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Stars (far bg)
  ctx.fillStyle = '#fff';
  for (let i = 0; i < 50; i++) {
    const sx = ((i * 137 + 50) % 900 - cx * 0.05) % 900;
    const sy = (i * 73 + 20) % 200;
    ctx.globalAlpha = 0.3 + (Math.sin(Date.now() * 0.002 + i) * 0.3);
    ctx.fillRect(sx < 0 ? sx + 900 : sx, sy, 1, 1);
  }
  ctx.globalAlpha = 1;

  // Background layer - distant mountains (parallax 0.1)
  ctx.fillStyle = '#1a1030';
  for (let i = -1; i < 5; i++) {
    const bx = i * 300 - (cx * 0.1) % 300;
    ctx.beginPath();
    ctx.moveTo(bx, H);
    ctx.lineTo(bx + 50, 180);
    ctx.lineTo(bx + 150, 140);
    ctx.lineTo(bx + 250, 200);
    ctx.lineTo(bx + 300, H);
    ctx.fill();
  }

  // Mid-ground layer - ruined buildings (parallax 0.3)
  ctx.fillStyle = '#2a1a20';
  for (let i = -1; i < 6; i++) {
    const mx = i * 200 - (cx * 0.3) % 200;
    const bh = 80 + (i * 47) % 60;
    ctx.fillRect(mx + 20, H - bh - 80, 40, bh);
    ctx.fillRect(mx + 80, H - bh - 50, 30, bh - 20);
    ctx.fillRect(mx + 130, H - bh - 70, 50, bh + 10);
    // Windows
    ctx.fillStyle = '#443020';
    for (let w = 0; w < 3; w++) {
      for (let r = 0; r < 3; r++) {
        if (Math.random() > 0.3)
          ctx.fillRect(mx + 25 + w * 12, H - bh - 75 + r * 20, 5, 8);
      }
    }
    ctx.fillStyle = '#2a1a20';
  }

  // Smoke / haze
  ctx.fillStyle = 'rgba(40, 20, 10, 0.3)';
  for (let i = 0; i < 4; i++) {
    const sx = ((i * 250 + Date.now() * 0.02) % 1000) - 100;
    ctx.beginPath();
    ctx.ellipse(sx - cx * 0.2, 280 + Math.sin(Date.now() * 0.001 + i) * 10, 120, 40, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // Foreground - train tracks / ground (parallax 1.0 = game layer)
  // Train tracks
  ctx.fillStyle = '#3a3a3a';
  ctx.fillRect(0, GROUND_Y + 20, W, 5);
  ctx.fillRect(0, GROUND_Y + 30, W, 5);
  // Ties
  ctx.fillStyle = '#5a4a3a';
  for (let i = 0; i < 30; i++) {
    const tx = (i * 35 - cx * 0.8) % (30 * 35);
    ctx.fillRect(tx < -10 ? tx + 30 * 35 : tx, GROUND_Y + 18, 10, 20);
  }

  // Ground
  ctx.fillStyle = '#2a2018';
  ctx.fillRect(0, GROUND_Y + 38, W, H - GROUND_Y - 38);

  // Train car surface (the platform)
  const trainGrad = ctx.createLinearGradient(0, GROUND_Y - 10, 0, GROUND_Y + 20);
  trainGrad.addColorStop(0, '#556');
  trainGrad.addColorStop(1, '#334');
  ctx.fillStyle = trainGrad;
  ctx.fillRect(0, GROUND_Y - 5, W, 25);
  // Train detail lines
  ctx.fillStyle = '#778';
  ctx.fillRect(0, GROUND_Y - 5, W, 2);
  // Rivets
  ctx.fillStyle = '#99a';
  for (let i = 0; i < 25; i++) {
    const rx = (i * 40 - cx * 0.9) % 1000;
    ctx.fillRect(rx < 0 ? rx + 1000 : rx, GROUND_Y, 3, 3);
    ctx.fillRect(rx < 0 ? rx + 1000 : rx, GROUND_Y + 12, 3, 3);
  }
}

// ==================== UPDATE ====================
function update(dt) {
  if (gameState !== 'PLAYING') return;
  const now = Date.now();
  player.frame += 0.15;

  // --- Player movement ---
  let moving = false;
  if (!player.sliding) {
    if (keys['ArrowLeft'] || keys['KeyA']) {
      player.x -= PLAYER_SPEED;
      player.dir = -1;
      moving = true;
    }
    if (keys['ArrowRight'] || keys['KeyD']) {
      player.x += PLAYER_SPEED;
      player.dir = 1;
      moving = true;
    }
  }

  // Jump
  if ((keys['Space']) && player.onGround && !player.sliding) {
    player.vy = -12;
    player.onGround = false;
  }

  // Gravity
  player.vy += GRAVITY;
  player.y += player.vy;
  if (player.y >= GROUND_Y) {
    player.y = GROUND_Y;
    player.vy = 0;
    player.onGround = true;
  }

  // Slide
  if ((keys['ShiftLeft'] || keys['ShiftRight']) && player.onGround && !player.sliding && !player.knifing) {
    player.sliding = true;
    player.slideTimer = 25;
    player.slideDir = player.dir;
    sfxSlideYell();
  }
  if (player.sliding) {
    player.slideTimer--;
    player.x += player.slideDir * 5;
    if (player.slideTimer <= 0) {
      player.sliding = false;
      player.vy = -5; // pop up
      player.onGround = false;
    }
  }

  // Knife
  if ((keys['ControlLeft'] || keys['ControlRight'] || keys['KeyQ']) && !player.knifing && !player.sliding) {
    player.knifing = true;
    player.knifeTimer = 15;
    sfxKnife();
  }
  if (player.knifing) {
    player.knifeTimer--;
    if (player.knifeTimer <= 0) player.knifing = false;
    // Knife hitbox
    enemies.forEach(e => {
      if (e.dying) return;
      const dist = Math.abs(e.x - player.x);
      if (dist < 40 && Math.abs(e.y - player.y) < 30) {
        e.hp -= 15;
        sfxKnifeHit();
        spawnGreenBlood(e.x, e.y - 15);
        triggerShake(3, 5);
        if (e.hp <= 0 && !e.dying) {
          e.dying = true;
          e.deathFrame = 0;
          kills++;
          registerKill();
          sfxEnemyYell(2);
          spawnLoot(e.x, e.y);
          spawnGreenBlood(e.x, e.y - 10);
        }
      }
    });
  }

  // Shooting
  if ((keys['KeyX'] || keys['KeyJ'] || keys['mouse0'] || keys['KeyZ'] ||
       !(keys['ControlLeft'] || keys['ControlRight'] || keys['KeyQ'])) &&
      !player.knifing && !player.sliding && !reloading) {
    // Auto-fire if no special action
  }
  // Actually, let's make rifle fire automatically when not doing other actions
  if (!player.knifing && !player.sliding && !reloading && player.ammo > 0) {
    if (now - lastFireTime > FIRE_RATE) {
      // Fire rifle
      lastFireTime = now;
      player.ammo--;
      bullets.push({
        x: player.x + player.dir * 25,
        y: player.y - 16,
        vx: player.dir * BULLET_SPEED,
        life: 80
      });
      sfxRifle();
      spawnMuzzleFlash(player.x, player.y, player.dir);
      spawnShell(player.x, player.y, player.dir);
      triggerShake(1, 2);

      if (player.ammo <= 0) {
        reloading = true;
        reloadStart = now;
        sfxReload();
      }
    }
  }

  // Reload
  if (reloading && now - reloadStart >= RELOAD_TIME) {
    reloading = false;
    player.ammo = MAX_AMMO;
  }

  // Invulnerability timer
  if (player.invuln > 0) player.invuln--;

  // Player state
  player.state = player.knifing ? 'knife' : (player.sliding ? 'slide' : (moving || !player.onGround ? 'run' : 'idle'));

  // --- Camera ---
  camera.x += (player.x - W / 3 - camera.x) * 0.08;

  // --- Level progress ---
  levelProgress = Math.max(levelProgress, player.x);
  if (levelProgress >= LEVEL_LENGTH) {
    gameState = 'WIN';
    stopMusic();
    showWinScreen();
    return;
  }

  // --- Bullets ---
  bullets.forEach(b => {
    b.x += b.vx;
    b.life--;
  });
  bullets = bullets.filter(b => b.life > 0);

  // Bullet-enemy collision
  bullets.forEach(b => {
    enemies.forEach(e => {
      if (e.dying) return;
      if (Math.abs(b.x - e.x) < 15 && Math.abs(b.y - e.y + 10) < 25) {
        e.hp -= 5;
        b.life = 0;
        spawnGreenBlood(e.x, e.y - 10);
        triggerShake(1, 2);
        if (e.hp <= 0 && !e.dying) {
          e.dying = true;
          e.deathFrame = 0;
          kills++;
          registerKill();
          sfxEnemyYell(2);
          spawnLoot(e.x, e.y);
          spawnGreenBlood(e.x, e.y - 10);
          sfxExplosion();
        }
      }
    });
  });

  // --- Enemies ---
  // Ensure minimum count
  const alive = enemies.filter(e => !e.dying).length;
  while (alive + (enemies.length - alive) < 3 || enemies.filter(e => !e.dying).length < 3) {
    spawnEnemy();
  }

  enemies.forEach(e => {
    if (e.dying) {
      e.deathFrame++;
      if (e.deathFrame > 30) e.remove = true;
      return;
    }
    e.frame += 0.1;

    // Chase player
    const dx = player.x - e.x;
    e.dir = dx > 0 ? 1 : -1;
    const dist = Math.abs(dx);
    if (dist > 60) {
      e.x += e.dir * PLAYER_SPEED * 0.7;
    }

    // Shoot
    e.shootTimer--;
    if (e.shootTimer <= 0 && dist < 500) {
      e.shootTimer = 80 + Math.random() * 80;
      enemyBullets.push({
        x: e.x + e.dir * 15,
        y: e.y - 12,
        vx: e.dir * ENEMY_BULLET_SPEED,
        life: 60
      });
      sfxEnemyShoot();
    }

    // Yell
    e.yellTimer--;
    if (e.yellTimer <= 0) {
      e.yellTimer = 200 + Math.random() * 400;
      sfxEnemyYell(Math.floor(Math.random() * 2));
    }
  });
  enemies = enemies.filter(e => !e.remove);

  // --- Enemy bullets ---
  enemyBullets.forEach(b => {
    b.x += b.vx;
    b.life--;
    // Hit player
    if (player.invuln <= 0 && !player.sliding &&
        Math.abs(b.x - player.x) < 12 && Math.abs(b.y - player.y + 10) < 20) {
      b.life = 0;
      player.hp -= 3;
      player.invuln = 30;
      spawnRedBlood(player.x, player.y - 10);
      triggerShake(3, 5);
      if (player.hp <= 0) {
        gameState = 'GAMEOVER';
        stopMusic();
        showGameOverScreen();
        return;
      }
    }
  });
  enemyBullets = enemyBullets.filter(b => b.life > 0);

  // --- Particles ---
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    if (p.gravity) p.vy += 0.2;
    p.vx *= 0.97;
    p.vy *= 0.97;
    p.life--;
  });
  particles = particles.filter(p => p.life > 0);

  // --- Loots ---
  loots.forEach(l => {
    l.vy += 0.3;
    l.y += l.vy;
    if (l.y > GROUND_Y) { l.y = GROUND_Y; l.vy = 0; }
    l.sparkle++;
    l.life--;
    // Collect
    if (!l.collected && Math.abs(l.x - player.x) < 20 && Math.abs(l.y - player.y) < 20) {
      l.collected = true;
      l.life = 0;
      sfxCoin();
      spawnParticles(l.x, l.y, '#ff0', 6, 3, 15);
    }
  });
  loots = loots.filter(l => l.life > 0);

  // --- Combo ---
  if (comboTimer > 0) comboTimer--;
  if (comboTimer <= 0) comboKills = 0;

  // --- Shake ---
  if (shakeDur > 0) {
    shakeX = (Math.random() - 0.5) * shakeDur;
    shakeY = (Math.random() - 0.5) * shakeDur;
    shakeDur--;
  } else {
    shakeX = 0; shakeY = 0;
  }
}

function registerKill() {
  comboKills++;
  comboTimer = 90; // ~1.5 seconds
  if (comboKills >= 3) {
    const word = announcements[Math.floor(Math.random() * announcements.length)];
    showAnnouncement(word);
    sfxAnnouncer(word);
    comboKills = 0;
  }
}

let announcerText = '';
let announcerTimer = 0;
function showAnnouncement(text) {
  announcerText = text;
  announcerTimer = 60;
}

function triggerShake(intensity, duration) {
  shakeDur = Math.max(shakeDur, duration);
}

// ==================== RENDER ====================
function render() {
  ctx.clearRect(0, 0, W, H);
  ctx.save();
  ctx.translate(shakeX - camera.x, shakeY);

  if (gameState === 'PLAYING' || gameState === 'COUNTDOWN') {
    // Parallax
    ctx.save();
    ctx.translate(camera.x, 0); // reset for parallax
    drawParallax();
    ctx.restore();

    if (gameState === 'PLAYING') {
      // Loots
      loots.forEach(l => {
        if (l.collected) return;
        ctx.fillStyle = '#ff0';
        ctx.beginPath();
        ctx.arc(l.x, l.y - 5, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#fa0';
        ctx.fillRect(l.x - 2, l.y - 7, 4, 4);
        if (l.sparkle % 10 < 5) {
          ctx.fillStyle = '#fff';
          ctx.fillRect(l.x - 1, l.y - 9, 2, 2);
        }
      });

      // Enemy bullets
      ctx.fillStyle = '#f44';
      enemyBullets.forEach(b => {
        ctx.fillRect(b.x - 3, b.y - 1, 6, 2);
      });

      // Player bullets
      ctx.fillStyle = '#ff0';
      bullets.forEach(b => {
        ctx.fillRect(b.x - 4, b.y - 1, 8, 2);
        ctx.fillStyle = '#fa0';
        ctx.fillRect(b.x - 2, b.y, 4, 1);
        ctx.fillStyle = '#ff0';
      });

      // Enemies
      enemies.forEach(e => {
        drawEnemy(e.x, e.y, e.frame, e.dir, e.hp, ENEMY_HP, e.dying, e.deathFrame);
      });

      // Player
      if (player.invuln <= 0 || player.invuln % 4 < 2) {
        drawAleck(player.x, player.y, player.frame, player.dir, player.state);
      }

      // Particles
      particles.forEach(p => {
        ctx.globalAlpha = p.life / p.maxLife;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, p.size, p.size);
      });
      ctx.globalAlpha = 1;
    }
  }

  ctx.restore();

  // Announcer overlay
  if (announcerTimer > 0) {
    announcerTimer--;
    ctx.save();
    ctx.fillStyle = `rgba(255, 0, 0, ${Math.min(1, announcerTimer / 20)})`;
    ctx.font = 'bold 48px Courier New';
    ctx.textAlign = 'center';
    ctx.shadowColor = '#f00';
    ctx.shadowBlur = 20;
    ctx.fillText(announcerText, W / 2, H / 2 - 50);
    ctx.restore();
  }
}

// ==================== HUD ====================
function updateHUD() {
  if (gameState !== 'PLAYING') {
    document.getElementById('hud').style.display = 'none';
    document.getElementById('title-label').style.display = 'none';
    return;
  }
  document.getElementById('hud').style.display = 'block';
  document.getElementById('title-label').style.display = 'block';

  // Health
  const hpPct = Math.max(0, player.hp / PLAYER_MAX_HP * 100);
  document.getElementById('health-bar').style.width = hpPct + '%';
  document.getElementById('health-bar').style.background = hpPct < 30 ? '#f00' : hpPct < 60 ? '#fa0' : '#0c0';

  // Ammo
  const ammoEl = document.getElementById('ammo-counter');
  if (reloading) {
    ammoEl.textContent = 'RLD';
    ammoEl.style.color = '#ff0';
    ammoEl.className = 'shake';
  } else {
    ammoEl.textContent = player.ammo;
    const ratio = player.ammo / MAX_AMMO;
    if (ratio < 0.15) {
      ammoEl.style.color = '#f00';
      ammoEl.className = 'shake';
      ammoEl.style.textShadow = '0 0 12px #f00';
    } else if (ratio < 0.3) {
      ammoEl.style.color = '#f40';
      ammoEl.className = '';
      ammoEl.style.textShadow = '0 0 8px #f40';
    } else {
      ammoEl.style.color = '#0f0';
      ammoEl.className = '';
      ammoEl.style.textShadow = '0 0 8px #0f0';
    }
  }

  // Kills
  document.getElementById('kill-counter').textContent = kills;

  // Progress
  const prog = Math.min(100, (levelProgress / LEVEL_LENGTH) * 100);
  document.getElementById('progress-bar-fg').style.width = prog + '%';
}

// ==================== INTRO STATE ====================
let introParachuteY = 0;
function updateIntro(dt) {
  introOffset += 0.5;
  introParachuteY = (introParachuteY + 0.3) % 100;
}

function renderIntro() {
  // Sky
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#0a0a3a');
  grad.addColorStop(1, '#2a1540');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Clouds scrolling
  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  for (let i = 0; i < 8; i++) {
    const cy = ((i * 70 + introOffset * 2) % (H + 100)) - 50;
    const cx = 100 + (i * 137) % 600;
    ctx.beginPath();
    ctx.ellipse(cx, cy, 60 + i * 10, 15, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // Aleck parachuting
  const px = W / 2;
  const py = H / 2 + Math.sin(Date.now() * 0.002) * 15;
  drawAleck(px, py, introOffset, 1, 'parachute');

  // Overlay text
  const ov = document.getElementById('overlay');
  const blink = Math.floor(Date.now() / 500) % 2 === 0;
  let seqText = '';
  if (introSeqState === 0) seqText = '➡ Step 1: Press LEFT (← or A)';
  else if (introSeqState === 1) seqText = '➡ Step 2: Press RIGHT (→ or D)';
  else if (introSeqState === 2) seqText = '➡ Step 3: Press SPACE';

  ov.innerHTML = `
    <div style="font-size:32px;color:#ff0;text-shadow:0 0 20px #ff0;margin-bottom:20px;${blink ? '' : 'opacity:0.3'}">
      FREE CREDITS: HACK!
    </div>
    <div style="font-size:16px;color:#fff;margin-bottom:10px;">${seqText}</div>
    <div style="font-size:14px;color:#aaa;margin-bottom:30px;">Enter the sequence to unlock</div>
    <div style="font-size:24px;color:#f80;${blink ? '' : 'opacity:0.2'}">
      INSERT COINS
    </div>
  `;
}

function renderCountdown() {
  const elapsed = Date.now() - countdownStart;
  const remaining = Math.ceil((5000 - elapsed) / 1000);

  // Draw game scene behind
  ctx.save();
  ctx.translate(-camera.x, 0);
  drawParallax();
  drawAleck(player.x, player.y - 80 + (elapsed / 5000) * 80, introOffset, 1, 'parachute');
  ctx.restore();

  // Countdown
  const ov = document.getElementById('overlay');
  if (remaining > 0) {
    ov.innerHTML = `<div style="font-size:120px;color:#f00;text-shadow:0 0 40px #f00;">${remaining}</div>`;
  } else {
    ov.innerHTML = '';
    ov.classList.remove('active');
    gameState = 'PLAYING';
    startMusic();
  }
}

// ==================== END SCREENS ====================
function showGameOverScreen() {
  const ov = document.getElementById('overlay');
  ov.classList.add('active');
  ov.style.background = '#000';
  ov.innerHTML = '';
  gameOverPresses = 0;

  window.addEventListener('keydown', gameOverKeyHandler);
}

function gameOverKeyHandler(e) {
  gameOverPresses++;
  if (gameOverPresses < 6) return;
  if (gameOverPresses === 6) {
    ensureAudio();
    sfxSiren();
    const ov = document.getElementById('overlay');
    ov.style.background = '#200';
    ov.innerHTML = `
      <div style="font-size:120px;color:#f00;text-shadow:0 0 60px #f00;">LOSER</div>
      <div style="font-size:18px;color:#aaa;margin-top:30px;">If you dare, metal jacket...</div>
      <div style="font-size:14px;color:#666;margin-top:15px;">Press ENTER to restart</div>
    `;
    window.removeEventListener('keydown', gameOverKeyHandler);
    window.addEventListener('keydown', function restartHandler(e) {
      if (e.code === 'Enter') {
        window.removeEventListener('keydown', restartHandler);
        ov.style.background = '';
        ov.innerHTML = '';
        ov.classList.remove('active');
        gameState = 'INTRO';
        introSeqState = 0;
        ov.classList.add('active');
        initGame();
      }
    });
  }
}

function showWinScreen() {
  const ov = document.getElementById('overlay');
  ov.classList.add('active');
  ov.style.background = '#fff';
  ov.innerHTML = '';
  winPresses = 0;

  window.addEventListener('keydown', winKeyHandler);
}

function winKeyHandler(e) {
  winPresses++;
  if (winPresses < 6) return;
  if (winPresses === 6) {
    ensureAudio();
    sfxSiren();
    const ov = document.getElementById('overlay');
    ov.style.background = '#eef';
    ov.innerHTML = `
      <div style="font-size:100px;color:#46f;text-shadow:0 0 60px #46f;">LOSER</div>
      <div style="font-size:16px;color:#666;margin-top:30px;">
        The "Double FREE CREDIT Slob" function was never implemented.
      </div>
      <div style="font-size:14px;color:#999;margin-top:15px;">
        You must reload the browser to start again.
      </div>
      <div style="font-size:12px;color:#bbb;margin-top:10px;">
        (No, really. We're stuck here now. F5 is your friend.)
      </div>
    `;
    window.removeEventListener('keydown', winKeyHandler);
    // Intentionally stuck
  }
}

// ==================== INPUT ====================
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  e.preventDefault();
  ensureAudio();

  if (gameState === 'INTRO') {
    if (introSeqState === 0 && (e.code === 'ArrowLeft' || e.code === 'KeyA')) {
      introSeqState = 1;
      playTone(400, 0.1, 'square', 0.1);
    } else if (introSeqState === 1 && (e.code === 'ArrowRight' || e.code === 'KeyD')) {
      introSeqState = 2;
      playTone(600, 0.1, 'square', 0.1);
    } else if (introSeqState === 2 && e.code === 'Space') {
      introSeqState = 3;
      playTone(800, 0.15, 'square', 0.15);
      // Start countdown
      gameState = 'COUNTDOWN';
      countdownStart = Date.now();
      initGame();
      player.x = 200;
      camera.x = 0;
    }
  }
});

window.addEventListener('keyup', e => {
  keys[e.code] = false;
});

// Prevent context menu on ctrl
window.addEventListener('contextmenu', e => e.preventDefault());

// ==================== GAME LOOP ====================
function gameLoop(timestamp) {
  const dt = Math.min(32, timestamp - (lastTime || timestamp));
  lastTime = timestamp;

  if (gameState === 'INTRO') {
    updateIntro(dt);
    renderIntro();
  } else if (gameState === 'COUNTDOWN') {
    introOffset += 0.5;
    renderCountdown();
  } else if (gameState === 'PLAYING') {
    update(dt);
    render();
    updateHUD();
  }
  // GAMEOVER and WIN are handled by overlays

  requestAnimationFrame(gameLoop);
}

// Scale canvas to fit
function resize() {
  const scale = Math.min(window.innerWidth / W, window.innerHeight / H);
  canvas.style.width = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
}
window.addEventListener('resize', resize);
resize();

// Start
requestAnimationFrame(gameLoop);
</script>
