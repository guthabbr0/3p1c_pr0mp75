<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Metal Slob xIA</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    :root {
      color-scheme: dark;
      --hud-bg: rgba(10, 8, 17, 0.74);
      --hud-border: rgba(255, 255, 255, 0.13);
      --glow: rgba(255, 157, 40, 0.34);
      --cold-glow: rgba(117, 194, 255, 0.28);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 40%, rgba(255, 136, 42, 0.1), transparent 24%),
        radial-gradient(circle at 50% 50%, rgba(97, 144, 255, 0.08), transparent 38%),
        linear-gradient(180deg, #0d0911, #050507 60%, #000);
      font-family: 'Press Start 2P', ui-monospace, SFMono-Regular, Menlo, monospace;
      image-rendering: pixelated;
      user-select: none;
      -webkit-user-select: none;
      overscroll-behavior: none;
    }

    body {
      display: grid;
      place-items: center;
    }

    #cabinet {
      position: relative;
      width: 480px;
      height: 270px;
      box-shadow:
        0 0 0 2px rgba(255,255,255,.05),
        0 0 0 8px rgba(0,0,0,.35),
        0 32px 70px rgba(0,0,0,.72),
        0 0 40px rgba(78, 147, 255, .08),
        0 0 70px rgba(255, 109, 40, .08);
      background: #000;
    }

    #cabinet::before {
      content: '';
      position: absolute;
      inset: -8px;
      border: 1px solid rgba(255,255,255,.07);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.035);
      pointer-events: none;
    }

    #game {
      display: block;
      width: 100%;
      height: 100%;
      background: #000;
      image-rendering: pixelated;
    }

    #ui {
      position: absolute;
      inset: 0;
      pointer-events: none;
      color: #fff;
      text-transform: uppercase;
      overflow: hidden;
    }

    #hud {
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      z-index: 7;
      transition: opacity .14s ease;
    }

    .hudBox {
      min-width: 120px;
      padding: 8px 10px 7px;
      border: 2px solid var(--hud-border);
      background: var(--hud-bg);
      box-shadow:
        inset 0 0 0 2px rgba(255,255,255,.03),
        0 0 16px rgba(0,0,0,.24);
      backdrop-filter: blur(3px);
    }

    #scoreBox {
      margin-inline: auto;
      min-width: 166px;
      text-align: center;
    }

    .label {
      font-size: 8px;
      letter-spacing: 1.6px;
      color: rgba(255,255,255,.6);
      margin-bottom: 7px;
      white-space: nowrap;
    }

    #healthBar {
      width: 162px;
      height: 14px;
      background: #24090c;
      border: 2px solid rgba(255,255,255,.12);
      box-shadow:
        inset 0 0 0 2px rgba(255,255,255,.03),
        0 0 14px rgba(255, 62, 62, .08);
      overflow: hidden;
    }

    #healthFill {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, #ff2b28, #ff7c4b 58%, #fff09f 100%);
      transition: width .08s linear;
    }

    #score {
      font-size: 15px;
      line-height: 1;
      color: #fff0a8;
      text-shadow: 0 0 10px rgba(255,220,82,.15);
      min-width: 142px;
    }

    #ammoWrap {
      min-width: 132px;
      text-align: right;
    }

    #ammo {
      font-size: 22px;
      line-height: 1;
      min-width: 74px;
      display: inline-block;
      text-shadow: 0 0 10px rgba(255,255,255,.1);
      transform-origin: center;
      color: #fff;
    }

    #ammoWrap.warm #ammo { color: #ffe562; }
    #ammoWrap.hot #ammo { color: #ff9b32; }

    #ammoWrap.zero #ammo {
      color: #ff2338;
      animation: ammoShake .08s steps(2) infinite;
      text-shadow: 0 0 10px rgba(255, 35, 56, .38);
    }

    #ammoWrap.reload #ammo {
      animation: ammoShake .08s steps(2) infinite, ammoPulse .28s steps(2) infinite;
    }

    #reloadText {
      margin-top: 4px;
      min-height: 11px;
      font-size: 8px;
      line-height: 1.1;
      opacity: 0;
      transform: translateY(2px);
      color: #ffb1a9;
      text-shadow: 0 0 8px rgba(255, 42, 42, .18);
      transition: opacity .12s ease, transform .12s ease;
    }

    #ammoWrap.reload #reloadText {
      opacity: 1;
      transform: translateY(0);
      animation: reloadPulse .28s steps(2) infinite;
    }

    @keyframes ammoShake {
      0%, 100% { transform: translate(0, 0); }
      25% { transform: translate(-1px, 0); }
      50% { transform: translate(1px, 1px); }
      75% { transform: translate(1px, -1px); }
    }

    @keyframes ammoPulse {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.45); }
    }

    @keyframes reloadPulse {
      0%, 100% { opacity: .8; }
      50% { opacity: 1; }
    }

    #announce,
    #hackFlash,
    #countdown {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      text-align: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity .08s ease, transform .08s ease;
    }

    #announce {
      top: 56px;
      font-size: clamp(16px, 2vw, 28px);
      color: #fff5aa;
      text-shadow:
        0 0 10px rgba(255,255,255,.12),
        0 0 22px rgba(255,160,53,.26),
        0 0 44px rgba(0,0,0,.28);
      letter-spacing: 2px;
    }

    #announce.visible {
      opacity: 1;
      transform: translateX(-50%) scale(1.03);
    }

    #hackFlash {
      top: 92px;
      font-size: clamp(10px, 1.2vw, 16px);
      color: #72ffb5;
      text-shadow:
        0 0 10px rgba(114,255,181,.18),
        0 0 26px rgba(75,255,193,.18),
        0 0 60px rgba(0,0,0,.3);
      letter-spacing: 2px;
    }

    #hackFlash.visible {
      opacity: 1;
      animation: hackPulse .12s steps(2) infinite;
    }

    @keyframes hackPulse {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(-1px) scale(1.02); }
    }

    #intro {
      position: absolute;
      inset: 0;
      display: none;
      place-items: center;
      z-index: 8;
      padding: 16px;
      text-align: center;
      background: linear-gradient(180deg, rgba(8,10,20,.14), rgba(0,0,0,.18));
    }

    #introInner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      width: min(94%, 440px);
      padding: 16px 14px;
      border: 2px solid rgba(255,255,255,.12);
      background:
        linear-gradient(180deg, rgba(9, 7, 16, .76), rgba(9, 7, 16, .58));
      box-shadow:
        inset 0 0 0 2px rgba(255,255,255,.03),
        0 0 28px rgba(0,0,0,.24);
    }

    #freeCredits {
      font-size: clamp(14px, 1.6vw, 20px);
      line-height: 1.4;
      color: #69ffb2;
      text-shadow:
        0 0 8px rgba(105,255,178,.16),
        0 0 18px rgba(55,235,255,.16),
        2px 0 rgba(255,70,120,.18),
        -2px 0 rgba(85,185,255,.18);
      animation: freeGlitch .16s steps(2) infinite;
    }

    @keyframes freeGlitch {
      0%, 100% { transform: translate(0, 0); }
      25% { transform: translate(1px, 0); }
      50% { transform: translate(-1px, 0); }
      75% { transform: translate(0, 1px); }
    }

    #deployPrompt {
      font-size: clamp(10px, 1.15vw, 15px);
      line-height: 1.7;
      color: #f3f1ff;
      max-width: 420px;
    }

    #deploySequence {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      font-size: clamp(9px, 1vw, 13px);
      line-height: 1.4;
      color: #fff;
    }

    .seqStep {
      min-width: 82px;
      padding: 10px 10px 9px;
      border: 2px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.28);
      box-shadow: inset 0 0 0 2px rgba(255,255,255,.03);
    }

    .seqStep.done {
      color: #6dff9d;
      border-color: rgba(109,255,157,.6);
      box-shadow:
        0 0 18px rgba(109,255,157,.16),
        inset 0 0 0 2px rgba(109,255,157,.1);
    }

    .seqStep.next {
      color: #ffe562;
      border-color: rgba(255,229,98,.55);
      animation: seqBlink .2s steps(2) infinite;
    }

    .seqArrow {
      opacity: .56;
      color: #9ad0ff;
    }

    @keyframes seqBlink {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-1px); }
    }

    #controlNote {
      font-size: clamp(7px, .8vw, 10px);
      line-height: 1.8;
      color: #c1cffd;
      opacity: .88;
      max-width: 430px;
    }

    #countdown {
      top: 44%;
      font-size: clamp(34px, 11vw, 150px);
      line-height: 1;
      letter-spacing: 4px;
      color: #fff;
      text-shadow:
        0 0 22px rgba(255,255,255,.16),
        0 0 54px rgba(127,175,255,.18),
        0 0 76px rgba(255,120,40,.14);
    }

    #countdown.visible { opacity: 1; }

    #coinGhost {
      position: absolute;
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      z-index: 6;
      font-size: clamp(10px, 1vw, 13px);
      letter-spacing: 2px;
      color: rgba(255, 245, 194, .22);
      text-shadow: 0 0 10px rgba(255,140,40,.1);
      animation: coinBlink .48s steps(2) infinite;
      white-space: nowrap;
    }

    #coinGhost.loud {
      color: rgba(255, 245, 194, .78);
      text-shadow:
        0 0 8px rgba(255,255,255,.18),
        0 0 18px rgba(255,140,40,.2);
    }

    @keyframes coinBlink {
      0%, 100% { opacity: 1; }
      50% { opacity: .2; }
    }

    #cinema {
      position: absolute;
      inset: 0;
      display: none;
      place-items: center;
      text-align: center;
      z-index: 20;
      padding: 18px;
      pointer-events: none;
    }

    #cinema.show { display: grid; }
    #cinema.black { background: #000; color: #fff; }
    #cinema.white { background: #fff; color: #000; }
    #cinema.red { background: #4d0008; color: #ffe8e8; }
    #cinema.blue { background: #244fff; color: #ecf8ff; }

    #cinemaMain {
      font-size: clamp(42px, 18vw, 220px);
      line-height: .9;
      letter-spacing: 8px;
      text-shadow: 0 0 28px rgba(255,255,255,.22), 0 0 60px rgba(255,0,0,.2);
    }

    #cinemaSub {
      margin-top: 18px;
      font-size: clamp(10px, 1vw, 14px);
      line-height: 1.8;
      max-width: 420px;
      opacity: 0;
      transition: opacity .18s ease;
    }

    #cinema.showSub #cinemaSub { opacity: 1; }

    #crt {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 30;
      background:
        linear-gradient(rgba(255,255,255,.03), rgba(255,255,255,0) 8%, rgba(255,255,255,.025) 12%, rgba(255,255,255,0) 24%),
        repeating-linear-gradient(180deg, transparent 0 2px, rgba(0,0,0,.13) 2px 4px),
        radial-gradient(circle at center, transparent 56%, rgba(0,0,0,.26) 100%);
      mix-blend-mode: screen;
    }

    #crt::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(90deg, rgba(255,0,0,.03) 0 1px, rgba(0,255,255,.02) 1px 2px, transparent 2px 4px);
      opacity: .22;
      mix-blend-mode: screen;
    }
  </style>
</head>
<body>
  <div id="cabinet">
    <canvas id="game" width="480" height="270"></canvas>
    <div id="ui">
      <div id="hud">
        <div id="healthBox" class="hudBox">
          <div class="label">ALECK</div>
          <div id="healthBar"><div id="healthFill"></div></div>
        </div>
        <div id="scoreBox" class="hudBox">
          <div class="label">SCORE</div>
          <div id="score">0000000</div>
        </div>
        <div id="ammoWrap" class="hudBox">
          <div class="label">MAG</div>
          <div id="ammo">69</div>
          <div id="reloadText">RELOADING...</div>
        </div>
      </div>

      <div id="announce"></div>
      <div id="hackFlash">FREE CREDITS: HACK!</div>

      <div id="intro">
        <div id="introInner">
          <div id="freeCredits">FREE CREDITS: HACK!</div>
          <div id="deployPrompt">Press ← or A, then → or D, then SPACE to deploy!</div>
          <div id="deploySequence"></div>
          <div id="controlNote">MOVE A/D OR ←/→ • JUMP SPACE • FIRE Z / J / CLICK • KNIFE CTRL / Q • SLIDE SHIFT</div>
          <div id="countdown"></div>
        </div>
      </div>

      <div id="coinGhost">INSERT COINS</div>

      <div id="cinema">
        <div>
          <div id="cinemaMain"></div>
          <div id="cinemaSub"></div>
        </div>
      </div>

      <div id="crt"></div>
    </div>
  </div>

  <script>
  (() => {
    const cabinet = document.getElementById('cabinet');
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;

    const W = canvas.width;
    const H = canvas.height;
    const GROUND_Y = 214;
    const MAG_SIZE = 69;
    const FIRE_RATE = 8;
    const RELOAD_TIME = 1.2;
    const PLAYER_SPEED = 90;
    const ENEMY_SPEED = 90;
    const AUTO_SCROLL = 58;
    const WORLD_LENGTH = 20000;
    const JUMP_V = -230;
    const GRAVITY = 560;
    const SLIDE_TIME = 0.34;
    const SLIDE_COOLDOWN = 0.8;
    const KNIFE_TIME = 0.42;
    const PLAYER_MAX_HP = 100;
    const ENEMY_MAX_HP = 1;
    const ENEMY_BULLET_DAMAGE = 10;
    const DEV = new URLSearchParams(location.search).get('dev') === '1';

    const hud = document.getElementById('hud');
    const healthFill = document.getElementById('healthFill');
    const scoreEl = document.getElementById('score');
    const ammoWrap = document.getElementById('ammoWrap');
    const ammoEl = document.getElementById('ammo');
    const reloadEl = document.getElementById('reloadText');
    const announceEl = document.getElementById('announce');
    const hackFlashEl = document.getElementById('hackFlash');
    const introEl = document.getElementById('intro');
    const deploySeqEl = document.getElementById('deploySequence');
    const countdownEl = document.getElementById('countdown');
    const coinGhostEl = document.getElementById('coinGhost');
    const cinemaEl = document.getElementById('cinema');
    const cinemaMainEl = document.getElementById('cinemaMain');
    const cinemaSubEl = document.getElementById('cinemaSub');

    const keys = Object.create(null);
    const pressed = Object.create(null);

    const clamp = (n, a, b) => Math.max(a, Math.min(b, n));
    const lerp = (a, b, t) => a + (b - a) * t;
    const rand = (a = 0, b = 1) => a + Math.random() * (b - a);
    const choose = arr => arr[(Math.random() * arr.length) | 0];
    const fract = n => n - Math.floor(n);
    const hash = n => fract(Math.sin(n * 127.1 + 311.7) * 43758.5453123);
    const pad = (n, d = 7) => String(Math.max(0, n | 0)).padStart(d, '0');
    const mixColor = (a, b, t) => {
      const c1 = parseInt(a.slice(1), 16);
      const c2 = parseInt(b.slice(1), 16);
      const r = lerp((c1 >> 16) & 255, (c2 >> 16) & 255, t) | 0;
      const g = lerp((c1 >> 8) & 255, (c2 >> 8) & 255, t) | 0;
      const bb = lerp(c1 & 255, c2 & 255, t) | 0;
      return `rgb(${r},${g},${bb})`;
    };

    function resizeCanvas() {
      const aspect = W / H;
      let cssW = window.innerWidth;
      let cssH = cssW / aspect;
      if (cssH > window.innerHeight) {
        cssH = window.innerHeight;
        cssW = cssH * aspect;
      }
      cssW = Math.floor(cssW);
      cssH = Math.floor(cssH);
      cabinet.style.width = `${cssW}px`;
      cabinet.style.height = `${cssH}px`;
      canvas.style.width = `${cssW}px`;
      canvas.style.height = `${cssH}px`;
    }

    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    class AudioEngine {
      constructor() {
        this.ctx = null;
        this.master = null;
        this.musicBus = null;
        this.fxBus = null;
        this.noiseBuffer = null;
        this.musicStarted = false;
        this.scheduler = null;
        this.nextNoteTime = 0;
        this.step = 0;
        this.lastVoiceAt = 0;
        this.lastEnemyVoiceAt = 0;
        this.muted = false;
      }

      init() {
        if (this.ctx) return;
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if (!Ctx) return;
        this.ctx = new Ctx();
        this.master = this.ctx.createGain();
        this.master.gain.value = 0.9;
        const comp = this.ctx.createDynamicsCompressor();
        comp.threshold.value = -18;
        comp.knee.value = 22;
        comp.ratio.value = 5;
        comp.attack.value = 0.003;
        comp.release.value = 0.18;
        this.musicBus = this.ctx.createGain();
        this.musicBus.gain.value = 0.22;
        this.fxBus = this.ctx.createGain();
        this.fxBus.gain.value = 0.65;
        this.musicBus.connect(this.master);
        this.fxBus.connect(this.master);
        this.master.connect(comp);
        comp.connect(this.ctx.destination);

        const len = this.ctx.sampleRate * 2;
        this.noiseBuffer = this.ctx.createBuffer(1, len, this.ctx.sampleRate);
        const ch = this.noiseBuffer.getChannelData(0);
        for (let i = 0; i < len; i++) ch[i] = Math.random() * 2 - 1;
      }

      unlock() {
        this.init();
        if (!this.ctx) return;
        if (this.ctx.state !== 'running') this.ctx.resume();
        if (!this.musicStarted && !game.phase.startsWith('death') && !game.phase.startsWith('win')) {
          this.startMusic();
        }
      }

      setMusic(on) {
        if (!this.ctx || !this.musicBus) return;
        const now = this.ctx.currentTime;
        this.musicBus.gain.cancelScheduledValues(now);
        this.musicBus.gain.setTargetAtTime(on ? 0.22 : 0.0001, now, 0.06);
      }

      stopVoices() {
        if ('speechSynthesis' in window) {
          try { window.speechSynthesis.cancel(); } catch (_) {}
        }
      }

      panNode(bus, pan = 0) {
        if (!this.ctx) return bus;
        if (typeof StereoPannerNode !== 'undefined') {
          const p = this.ctx.createStereoPanner();
          p.pan.value = clamp(pan, -1, 1);
          p.connect(bus);
          return p;
        }
        return bus;
      }

      osc({time, freq = 440, dur = 0.1, type = 'square', gain = 0.08, bus = this.fxBus, pan = 0, slideTo = null, q = null, lp = null, hp = null}) {
        if (!this.ctx || this.muted) return;
        const t = time ?? this.ctx.currentTime;
        const o = this.ctx.createOscillator();
        const g = this.ctx.createGain();
        let chain = o;
        if (hp) {
          const f = this.ctx.createBiquadFilter();
          f.type = 'highpass';
          f.frequency.value = hp;
          chain.connect(f);
          chain = f;
        }
        if (lp) {
          const f = this.ctx.createBiquadFilter();
          f.type = 'lowpass';
          f.frequency.value = lp;
          if (q) f.Q.value = q;
          chain.connect(f);
          chain = f;
        }
        const out = this.panNode(bus, pan);
        chain.connect(g);
        g.connect(out);
        o.type = type;
        o.frequency.setValueAtTime(freq, t);
        if (slideTo != null) o.frequency.exponentialRampToValueAtTime(Math.max(40, slideTo), t + dur);
        g.gain.setValueAtTime(0.0001, t);
        g.gain.exponentialRampToValueAtTime(gain, t + 0.005);
        g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
        o.start(t);
        o.stop(t + dur + 0.02);
      }

      noise({time, dur = 0.08, gain = 0.05, bus = this.fxBus, pan = 0, hp = 800, lp = 4500, q = 1}) {
        if (!this.ctx || this.muted || !this.noiseBuffer) return;
        const t = time ?? this.ctx.currentTime;
        const src = this.ctx.createBufferSource();
        src.buffer = this.noiseBuffer;
        const h = this.ctx.createBiquadFilter();
        h.type = 'highpass';
        h.frequency.value = hp;
        const l = this.ctx.createBiquadFilter();
        l.type = 'lowpass';
        l.frequency.value = lp;
        l.Q.value = q;
        const g = this.ctx.createGain();
        const out = this.panNode(bus, pan);
        src.connect(h);
        h.connect(l);
        l.connect(g);
        g.connect(out);
        g.gain.setValueAtTime(0.0001, t);
        g.gain.exponentialRampToValueAtTime(gain, t + 0.004);
        g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
        src.start(t);
        src.stop(t + dur + 0.02);
      }

      voice(text, opts = {}) {
        if (!('speechSynthesis' in window)) return false;
        const now = performance.now() / 1000;
        const cooldown = opts.cooldown ?? 0.18;
        if (opts.enemy) {
          if (now - this.lastEnemyVoiceAt < cooldown) return false;
          this.lastEnemyVoiceAt = now;
        } else {
          if (now - this.lastVoiceAt < cooldown) return false;
          this.lastVoiceAt = now;
        }
        try {
          const u = new SpeechSynthesisUtterance(text);
          u.rate = opts.rate ?? 1;
          u.pitch = opts.pitch ?? 1;
          u.volume = opts.volume ?? 0.8;
          u.lang = 'en-US';
          if (opts.announce) window.speechSynthesis.cancel();
          window.speechSynthesis.speak(u);
          return true;
        } catch (_) {
          return false;
        }
      }

      gun(pan = 0) {
        if (!this.ctx || this.muted) return;
        const t = this.ctx.currentTime;
        this.noise({ time: t, dur: 0.03, gain: 0.08, pan, hp: 1800, lp: 9000, q: 0.8 });
        this.osc({ time: t, freq: 980, slideTo: 180, dur: 0.07, type: 'square', gain: 0.05, pan, lp: 2200 });
        this.osc({ time: t, freq: 120, slideTo: 58, dur: 0.11, type: 'triangle', gain: 0.04, pan, lp: 800 });
      }

      coin() {
        if (!this.ctx || this.muted) return;
        const t = this.ctx.currentTime;
        this.osc({ time: t, freq: 1568, dur: 0.08, type: 'square', gain: 0.05, pan: rand(-0.3, 0.3), lp: 5000 });
        this.osc({ time: t + 0.045, freq: 2093, dur: 0.12, type: 'triangle', gain: 0.045, pan: rand(-0.3, 0.3), lp: 5500 });
      }

      knifeSlash(pan = 0) {
        if (!this.ctx || this.muted) return;
        const t = this.ctx.currentTime;
        this.noise({ time: t, dur: 0.06, gain: 0.05, pan, hp: 1200, lp: 8000, q: 2 });
        this.noise({ time: t + 0.05, dur: 0.06, gain: 0.045, pan, hp: 1200, lp: 9000, q: 2 });
        this.osc({ time: t, freq: 1300, slideTo: 620, dur: 0.08, type: 'sawtooth', gain: 0.03, pan, hp: 500 });
      }

      knifeHit(pan = 0) {
        if (!this.ctx || this.muted) return;
        const t = this.ctx.currentTime;
        this.noise({ time: t, dur: 0.08, gain: 0.07, pan, hp: 120, lp: 1800, q: 1.6 });
        this.osc({ time: t, freq: 180, slideTo: 74, dur: 0.11, type: 'triangle', gain: 0.05, pan, lp: 900 });
        this.voice('chof chof', { rate: 1.18, pitch: 0.56, volume: 0.45, enemy: true, cooldown: 0.28 });
      }

      enemyDeath(pan = 0) {
        if (!this.ctx || this.muted) return;
        const t = this.ctx.currentTime;
        this.osc({ time: t, freq: 520, slideTo: 98, dur: 0.35, type: 'sawtooth', gain: 0.06, pan, lp: 1800 });
        this.noise({ time: t, dur: 0.12, gain: 0.03, pan, hp: 250, lp: 2200 });
        this.voice('aaaargh', { rate: 0.82, pitch: 0.45, volume: 0.75, enemy: true, cooldown: 0.22 });
      }

      enemyAttack(pan = 0) {
        if (!this.ctx || this.muted) return;
        const t = this.ctx.currentTime;
        this.osc({ time: t, freq: 310, slideTo: 220, dur: 0.18, type: 'square', gain: 0.03, pan, lp: 1400 });
        this.voice(choose(['raagh', 'die']), { rate: 1.18, pitch: 0.62, volume: 0.45, enemy: true, cooldown: 0.35 });
      }

      enemySwear(pan = 0) {
        if (!this.ctx || this.muted) return;
        const t = this.ctx.currentTime;
        this.osc({ time: t, freq: 250, slideTo: 170, dur: 0.1, type: 'square', gain: 0.025, pan, lp: 1200 });
        this.voice(choose(['fu', 'dam', 'shi']), { rate: 1.12, pitch: 0.72, volume: 0.38, enemy: true, cooldown: 0.25 });
      }

      slideYell() {
        if (!this.ctx || this.muted) return;
        const t = this.ctx.currentTime;
        this.osc({ time: t, freq: 430, slideTo: 610, dur: 0.24, type: 'sawtooth', gain: 0.04, lp: 2200 });
        this.voice('yeaahhh', { rate: 1.1, pitch: 0.78, volume: 0.8, cooldown: 0.1 });
      }

      playerDamage() {
        if (!this.ctx || this.muted) return;
        const t = this.ctx.currentTime;
        this.osc({ time: t, freq: 150, slideTo: 80, dur: 0.13, type: 'triangle', gain: 0.055, lp: 900 });
        this.noise({ time: t, dur: 0.05, gain: 0.05, hp: 140, lp: 1800 });
        this.voice('ugh', { rate: 0.9, pitch: 0.55, volume: 0.5, cooldown: 0.18 });
      }

      reload() {
        if (!this.ctx || this.muted) return;
        const t = this.ctx.currentTime;
        this.noise({ time: t, dur: 0.025, gain: 0.03, hp: 1000, lp: 6000 });
        this.osc({ time: t, freq: 420, dur: 0.025, type: 'square', gain: 0.02 });
        this.noise({ time: t + 0.18, dur: 0.028, gain: 0.03, hp: 800, lp: 4000 });
        this.osc({ time: t + 0.18, freq: 320, dur: 0.03, type: 'square', gain: 0.018 });
        this.noise({ time: t + 0.42, dur: 0.04, gain: 0.035, hp: 500, lp: 3200 });
        this.osc({ time: t + 0.42, freq: 240, dur: 0.05, type: 'triangle', gain: 0.02 });
      }

      announcer(text) {
        if (!this.ctx || this.muted) return;
        const t = this.ctx.currentTime;
        this.osc({ time: t, freq: 140, slideTo: 96, dur: 0.25, type: 'square', gain: 0.05, lp: 1300 });
        this.osc({ time: t + 0.08, freq: 220, slideTo: 150, dur: 0.25, type: 'square', gain: 0.03, lp: 1600 });
        this.voice(text.toLowerCase(), { rate: 0.82, pitch: 0.45, volume: 1, announce: true, cooldown: 0.05 });
      }

      boom() {
        if (!this.ctx || this.muted) return;
        const t = this.ctx.currentTime;
        this.noise({ time: t, dur: 0.18, gain: 0.05, hp: 50, lp: 700 });
        this.osc({ time: t, freq: 70, slideTo: 40, dur: 0.25, type: 'triangle', gain: 0.05, lp: 250 });
      }

      siren() {
        if (!this.ctx) return 2.8;
        const t = this.ctx.currentTime;
        const dur = 2.8;
        const o = this.ctx.createOscillator();
        const g = this.ctx.createGain();
        const f = this.ctx.createBiquadFilter();
        f.type = 'bandpass';
        f.frequency.value = 900;
        f.Q.value = 1.2;
        o.type = 'sawtooth';
        const curve = new Float32Array(40);
        for (let i = 0; i < curve.length; i++) {
          const s = i / (curve.length - 1);
          curve[i] = 420 + Math.sin(s * Math.PI * 8) * 160 + (i % 2 ? 60 : -60);
        }
        o.frequency.setValueCurveAtTime(curve, t, dur);
        g.gain.setValueAtTime(0.0001, t);
        g.gain.exponentialRampToValueAtTime(0.23, t + 0.06);
        g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
        o.connect(f);
        f.connect(g);
        g.connect(this.fxBus);
        o.start(t);
        o.stop(t + dur + 0.05);
        return dur;
      }

      startMusic() {
        if (!this.ctx || this.musicStarted) return;
        this.musicStarted = true;
        this.nextNoteTime = this.ctx.currentTime + 0.05;
        this.step = 0;
        this.scheduler = setInterval(() => this.scheduleMusic(), 80);
      }

      stopMusic() {
        if (this.scheduler) {
          clearInterval(this.scheduler);
          this.scheduler = null;
        }
        this.musicStarted = false;
      }

      scheduleMusic() {
        if (!this.ctx || !this.musicStarted) return;
        const bpm = 164;
        const stepDur = 60 / bpm / 2;
        while (this.nextNoteTime < this.ctx.currentTime + 0.25) {
          this.scheduleStep(this.step, this.nextNoteTime);
          this.step = (this.step + 1) % 32;
          this.nextNoteTime += stepDur;
        }
      }

      note(freq, time, dur = 0.12, gain = 0.03, type = 'square', pan = 0) {
        this.osc({ time, freq, dur, gain, type, pan, bus: this.musicBus, lp: 2500 });
      }

      kick(time) {
        if (!this.ctx) return;
        this.osc({ time, freq: 112, slideTo: 46, dur: 0.16, type: 'sine', gain: 0.06, bus: this.musicBus, lp: 320 });
        this.noise({ time, dur: 0.02, gain: 0.02, bus: this.musicBus, hp: 400, lp: 1500 });
      }

      snare(time) {
        if (!this.ctx) return;
        this.noise({ time, dur: 0.07, gain: 0.03, bus: this.musicBus, hp: 1200, lp: 6000 });
        this.osc({ time, freq: 210, slideTo: 160, dur: 0.06, type: 'triangle', gain: 0.018, bus: this.musicBus, lp: 900 });
      }

      hat(time) {
        if (!this.ctx) return;
        this.noise({ time, dur: 0.02, gain: 0.012, bus: this.musicBus, hp: 3000, lp: 9000 });
      }

      scheduleStep(step, time) {
        const bass = [
          110, null, 110, null, 98, null, 110, null,
          82, null, 82, null, 98, null, 110, null,
          110, null, 123, null, 110, null, 98, null,
          82, null, 98, null, 110, 123, 147, null
        ];
        const lead = [
          440, 523, 587, 523, 440, 523, 659, 587,
          392, 466, 523, 466, 392, 466, 587, 523,
          440, 523, 587, 659, 587, 523, 440, 523,
          392, 466, 523, 587, 659, 587, 523, 466
        ];
        const stabs = [
          null, null, 659, null, null, null, 784, null,
          null, null, 587, null, null, null, 659, null,
          null, null, 880, null, null, null, 784, null,
          null, null, 659, null, null, 880, 987, null
        ];

        if (step % 8 === 0 || step % 8 === 4) this.kick(time);
        if (step % 8 === 4) this.snare(time);
        if (step % 2 === 1) this.hat(time);
        if (step % 4 === 0 && bass[step]) this.note(bass[step], time, 0.18, 0.045, 'triangle', -0.15);
        if (lead[step]) this.note(lead[step], time + 0.01, 0.11, 0.02, 'square', 0.16);
        if (stabs[step]) this.note(stabs[step], time + 0.02, 0.08, 0.014, 'sawtooth', 0.05);
      }
    }

    const audio = new AudioEngine();

    const game = {
      time: 0,
      phase: DEV ? 'gameplay' : 'intro',
      cameraX: 0,
      score: 0,
      announceTimer: 0,
      hackFlashTimer: 0,
      shakeTimer: 0,
      shakeMag: 0,
      intro: {
        progress: 0,
        chute: true,
        y: 22,
        x: W * 0.44,
        countdown: 5,
        scroll: 0,
        deploying: false,
      },
      player: null,
      enemies: [],
      bullets: [],
      particles: [],
      shells: [],
      pickups: [],
      explosions: [],
      killTimes: [],
      rapidFlags: { headshot: false, annihilation: false },
      nextSpawnSide: 'right',
      silentKeyMashes: 0,
      cinemaReadyForRestart: false,
      ambientBoom: 2.8,
      lastTime: performance.now(),
    };

    function clearHeld() {
      keys.left = false;
      keys.right = false;
      keys.jump = false;
      keys.fire = false;
      keys.knife = false;
      keys.slide = false;
    }

    function makePlayer() {
      return {
        x: 110,
        y: GROUND_Y - 48,
        w: 24,
        h: 48,
        vx: 0,
        vy: 0,
        facing: 1,
        onGround: true,
        hp: PLAYER_MAX_HP,
        mag: MAG_SIZE,
        reloadTimer: 0,
        shotCd: 0,
        shotPose: 0,
        muzzleTimer: 0,
        knifeTimer: 0,
        knifeHitDone: false,
        slideTimer: 0,
        slideCooldown: 0,
        invuln: 0,
        hurtTimer: 0,
        frame: 0,
      };
    }

    function resetGame(toPhase = DEV ? 'gameplay' : 'intro') {
      clearHeld();
      game.time = 0;
      game.phase = toPhase;
      game.cameraX = 0;
      game.score = 0;
      game.announceTimer = 0;
      game.hackFlashTimer = 0;
      game.shakeTimer = 0;
      game.shakeMag = 0;
      game.player = makePlayer();
      game.enemies = [];
      game.bullets = [];
      game.particles = [];
      game.shells = [];
      game.pickups = [];
      game.explosions = [];
      game.killTimes = [];
      game.rapidFlags = { headshot: false, annihilation: false };
      game.nextSpawnSide = 'right';
      game.silentKeyMashes = 0;
      game.cinemaReadyForRestart = false;
      game.ambientBoom = 2.8;
      game.intro = {
        progress: 0,
        chute: true,
        y: 22,
        x: W * 0.44,
        countdown: 5,
        scroll: 0,
        deploying: false,
      };
      cinemaEl.className = '';
      cinemaMainEl.textContent = '';
      cinemaSubEl.textContent = '';
      introEl.style.opacity = '1';
      countdownEl.textContent = '';
      audio.stopVoices();
      audio.unlock();
      audio.setMusic(toPhase === 'gameplay' || toPhase === 'intro');
      syncDeploySequence();
      syncUI();
      if (toPhase === 'gameplay') {
        for (let i = 0; i < desiredEnemyCount(); i++) spawnEnemy();
        seedPickups();
      }
    }

    function seedPickups() {
      while (game.pickups.length < 18) spawnPickup(game.cameraX + rand(40, W + 240));
    }

    function desiredEnemyCount() {
      const p = game.cameraX / WORLD_LENGTH;
      if (p < 0.33) return 4;
      if (p < 0.66) return 5;
      return 6;
    }

    function showAnnouncement(text, color = '#fff4a7', duration = 1.2) {
      announceEl.textContent = text;
      announceEl.style.color = color;
      announceEl.classList.add('visible');
      game.announceTimer = duration;
    }

    function triggerHackFlash() {
      game.hackFlashTimer = 0.72;
      hackFlashEl.classList.add('visible');
    }

    function screenShake(mag = 4, time = 0.16) {
      game.shakeMag = Math.max(game.shakeMag, mag);
      game.shakeTimer = Math.max(game.shakeTimer, time);
    }

    function startReload() {
      const p = game.player;
      if (p.reloadTimer > 0) return;
      p.reloadTimer = RELOAD_TIME;
      audio.reload();
    }

    function getPlayerHitbox() {
      const p = game.player;
      if (p.slideTimer > 0) {
        const x = p.facing > 0 ? p.x : p.x - 8;
        return { x, y: GROUND_Y - 18, w: 32, h: 18 };
      }
      return { x: p.x + 4, y: p.y + 3, w: 16, h: 42 };
    }

    function getEnemyHitbox(e) {
      return { x: e.x + 4, y: e.y + 3, w: 16, h: 40 };
    }

    function hitRectPoint(px, py, r) {
      return px >= r.x && px <= r.x + r.w && py >= r.y && py <= r.y + r.h;
    }

    function overlap(a, b) {
      return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }

    function spawnEnemy(side = game.nextSpawnSide) {
      const x = side === 'left' ? game.cameraX - rand(30, 90) : game.cameraX + W + rand(20, 90);
      game.nextSpawnSide = side === 'left' ? 'right' : 'left';
      game.enemies.push({
        x,
        y: GROUND_Y - 46,
        w: 22,
        h: 46,
        facing: side === 'left' ? 1 : -1,
        hp: ENEMY_MAX_HP,
        alive: true,
        flash: 0,
        shootCd: rand(0.3, 1.2),
        anim: rand(0, 10),
        deadTimer: 0,
        deathDur: 0.7,
        blinkCount: choose([2, 3]),
        swearLock: 0,
        remove: false,
      });
    }

    function spawnPickup(x) {
      const t = choose(['coin', 'medal', 'shine']);
      game.pickups.push({
        type: t,
        x,
        y: GROUND_Y - rand(12, 32),
        phase: rand(0, Math.PI * 2),
        taken: false,
        sparkle: rand(0, 1),
      });
    }

    function ensureChaos() {
      while (game.enemies.filter(e => e.alive && !e.remove).length < desiredEnemyCount()) {
        spawnEnemy();
      }
      while (game.pickups.filter(p => !p.taken && p.x > game.cameraX - 100 && p.x < game.cameraX + W + 400).length < 16) {
        spawnPickup(game.cameraX + rand(60, W + 340));
      }
    }

    function firePlayerBullet() {
      const p = game.player;
      if (p.reloadTimer > 0 || p.mag <= 0) {
        if (p.mag <= 0) startReload();
        return;
      }
      p.mag--;
      p.shotCd = 1 / FIRE_RATE;
      p.shotPose = 0.09;
      p.muzzleTimer = 0.06;
      const mx = p.facing > 0 ? p.x + 22 : p.x + 2;
      const my = (p.slideTimer > 0 ? GROUND_Y - 14 : p.y + 17) + rand(-1, 1);
      const vx = p.facing * 290;
      const vy = rand(-8, 8);
      game.bullets.push({ x: mx, y: my, px: mx, py: my, vx, vy, ttl: 1.2, from: 'player' });
      game.shells.push({ x: p.x + 10, y: p.y + 18, vx: -p.facing * rand(20, 45), vy: -rand(30, 60), rot: rand(0, 6.28), vr: rand(-6, 6), life: 0.9 });
      audio.gun(((mx - game.cameraX) / W) * 2 - 1);
      if (p.mag <= 0) startReload();
    }

    function fireEnemyBullet(e) {
      const ex = e.facing > 0 ? e.x + 20 : e.x + 2;
      const ey = e.y + 16;
      const ph = getPlayerHitbox();
      const targetX = ph.x + ph.w / 2;
      const targetY = ph.y + ph.h * 0.4;
      const dx = targetX - ex;
      const dy = targetY - ey + rand(-10, 10);
      const dist = Math.hypot(dx, dy) || 1;
      const speed = 170;
      game.bullets.push({ x: ex, y: ey, px: ex, py: ey, vx: dx / dist * speed, vy: dy / dist * speed, ttl: 2.2, from: 'enemy' });
      if (Math.random() < 0.45) audio.enemyAttack(((ex - game.cameraX) / W) * 2 - 1);
    }

    function burstBlood(x, y, color, amount = 10, violent = false) {
      for (let i = 0; i < amount; i++) {
        const a = rand(-Math.PI * 0.65, Math.PI * 0.65);
        const speed = rand(violent ? 70 : 35, violent ? 180 : 110);
        game.particles.push({
          kind: 'blood',
          x,
          y,
          vx: Math.cos(a) * speed,
          vy: Math.sin(a) * speed - rand(20, 60),
          color,
          size: rand(1.5, 3.5),
          life: rand(0.25, 0.55),
          maxLife: 0.55,
          gravity: 360,
        });
      }
    }

    function burstSpark(x, y, color = '#ffd74f', amount = 8) {
      for (let i = 0; i < amount; i++) {
        const a = rand(0, Math.PI * 2);
        const speed = rand(20, 100);
        game.particles.push({
          kind: 'spark',
          x,
          y,
          vx: Math.cos(a) * speed,
          vy: Math.sin(a) * speed,
          color,
          size: rand(1, 2.5),
          life: rand(0.18, 0.45),
          maxLife: 0.45,
          gravity: 70,
        });
      }
    }

    function puff(x, y, color = '#bfbfbf', amount = 5) {
      for (let i = 0; i < amount; i++) {
        game.particles.push({
          kind: 'smoke',
          x: x + rand(-4, 4),
          y: y + rand(-4, 4),
          vx: rand(-20, 20),
          vy: rand(-30, -4),
          color,
          size: rand(2, 6),
          life: rand(0.25, 0.7),
          maxLife: 0.7,
          gravity: -18,
        });
      }
    }

    function killEnemy(e, viaKnife = false) {
      if (!e.alive) return;
      e.alive = false;
      e.deadTimer = e.deathDur;
      e.vy = -rand(30, 70);
      e.flash = 0.05;
      burstBlood(e.x + 12, e.y + 18, '#48ff72', viaKnife ? 18 : 12, true);
      puff(e.x + 10, e.y + 28, '#b3f7bf', 6);
      screenShake(viaKnife ? 4 : 3, viaKnife ? 0.18 : 0.12);
      audio.enemyDeath((((e.x - game.cameraX) / W) * 2) - 1);
      game.score += viaKnife ? 150 : 100;
      registerKill();
      spawnEnemy();
    }

    function registerKill() {
      const now = game.time;
      game.killTimes.push(now);
      game.killTimes = game.killTimes.filter(t => now - t <= 2);
      if (game.killTimes.length >= 3 && !game.rapidFlags.headshot) {
        game.rapidFlags.headshot = true;
        showAnnouncement('HEADSHOT!', '#fff17a', 1.1);
        audio.announcer('HEADSHOT');
        screenShake(8, 0.32);
        game.score += 500;
      }
      if (game.killTimes.length >= 5 && !game.rapidFlags.annihilation) {
        game.rapidFlags.annihilation = true;
        showAnnouncement('ANNIHILATION!', '#9ec7ff', 1.2);
        audio.announcer('ANNIHILATION');
        screenShake(10, 0.4);
        game.score += 1000;
      }
    }

    function damageEnemy(e, dmg = 1, viaKnife = false) {
      if (!e.alive) return;
      e.hp -= dmg;
      e.flash = 0.05;
      burstBlood(e.x + 10 + rand(-2, 2), e.y + rand(10, 24), '#48ff72', viaKnife ? 14 : 6, viaKnife);
      if (e.hp <= 0) {
        killEnemy(e, viaKnife);
      } else if (Math.random() < 0.35 && e.swearLock <= 0) {
        audio.enemySwear((((e.x - game.cameraX) / W) * 2) - 1);
        e.swearLock = 0.25;
      }
    }

    function damagePlayer(amount) {
      const p = game.player;
      if (p.invuln > 0 || game.phase !== 'gameplay') return;
      p.hp = clamp(p.hp - amount, 0, PLAYER_MAX_HP);
      p.invuln = 0.28;
      p.hurtTimer = 0.22;
      burstBlood(p.x + 10, p.y + 16, '#ff3a35', 10, true);
      screenShake(5, 0.18);
      audio.playerDamage();
      if (p.hp <= 0) triggerGameOver();
    }

    function startKnife() {
      const p = game.player;
      if (p.knifeTimer > 0 || p.slideTimer > 0) return;
      p.knifeTimer = KNIFE_TIME;
      p.knifeHitDone = false;
      audio.knifeSlash();
    }

    function startSlide() {
      const p = game.player;
      if (!p.onGround || p.slideTimer > 0 || p.slideCooldown > 0) return;
      p.slideTimer = SLIDE_TIME;
      p.slideCooldown = SLIDE_COOLDOWN;
      p.shotPose = 0;
      p.knifeTimer = 0;
      audio.slideYell();
      puff(p.x + 8, GROUND_Y - 2, '#d8caa0', 8);
      screenShake(2, 0.08);
    }

    function processKnifeHit() {
      const p = game.player;
      if (p.knifeHitDone || p.knifeTimer <= 0) return;
      const progress = 1 - p.knifeTimer / KNIFE_TIME;
      if (progress < 0.18 || progress > 0.42) return;
      p.knifeHitDone = true;
      const range = 28;
      const box = {
        x: p.facing > 0 ? p.x + 16 : p.x - range,
        y: p.y + 6,
        w: range,
        h: 28,
      };
      let hits = 0;
      for (const e of game.enemies) {
        if (e.alive && overlap(box, getEnemyHitbox(e))) {
          damageEnemy(e, ENEMY_MAX_HP, true);
          hits++;
        }
      }
      if (hits > 0) {
        audio.knifeHit((box.x - game.cameraX) / W * 2 - 1);
        screenShake(6, 0.16);
      }
    }

    function syncDeploySequence() {
      const labels = ['LEFT / A', 'RIGHT / D', 'SPACE'];
      const html = labels.map((label, i) => {
        const cls = i < game.intro.progress ? 'seqStep done' : i === game.intro.progress ? 'seqStep next' : 'seqStep';
        return `<span class="${cls}">${label}</span>`;
      }).join('<span class="seqArrow">›</span>');
      deploySeqEl.innerHTML = html;
    }

    function syncUI() {
      const p = game.player;
      hud.style.opacity = game.phase === 'gameplay' ? '1' : '0';
      introEl.style.display = game.phase === 'intro' || game.phase === 'countdown' ? 'grid' : 'none';
      coinGhostEl.classList.toggle('loud', game.phase === 'intro' || game.phase === 'countdown');
      healthFill.style.width = `${(p.hp / PLAYER_MAX_HP) * 100}%`;
      scoreEl.textContent = pad(game.score);
      ammoEl.textContent = String(Math.max(0, p.mag));
      reloadEl.textContent = 'RELOADING...';
      const used = 1 - p.mag / MAG_SIZE;
      let ammoColor = '#ffffff';
      if (used < 0.5) ammoColor = mixColor('#ffffff', '#ffe562', used / 0.5);
      else ammoColor = mixColor('#ffe562', '#ff9b32', (used - 0.5) / 0.5);
      ammoEl.style.color = ammoColor;
      ammoWrap.classList.remove('warm', 'hot', 'zero', 'reload');
      if (p.reloadTimer > 0) {
        ammoWrap.classList.add('reload', 'zero');
        ammoEl.style.color = '#ff2338';
      } else if (p.mag <= 0) {
        ammoWrap.classList.add('zero');
        ammoEl.style.color = '#ff2338';
      } else if (p.mag <= 18) {
        ammoWrap.classList.add('hot');
      } else if (p.mag <= 42) {
        ammoWrap.classList.add('warm');
      }
      countdownEl.classList.toggle('visible', game.phase === 'countdown');
      if (game.announceTimer <= 0) announceEl.classList.remove('visible');
      if (game.hackFlashTimer <= 0) hackFlashEl.classList.remove('visible');
    }

    function triggerGameOver() {
      if (game.phase !== 'gameplay') return;
      clearHeld();
      game.phase = 'death_black';
      game.silentKeyMashes = 0;
      game.cinemaReadyForRestart = false;
      cinemaEl.className = 'show black';
      cinemaMainEl.textContent = '';
      cinemaSubEl.textContent = '';
      audio.setMusic(false);
      audio.stopVoices();
      game.bullets.length = 0;
      game.particles.length = 0;
      game.shells.length = 0;
      syncUI();
    }

    function revealDeathLoser() {
      game.phase = 'death_reveal';
      cinemaEl.className = 'show red';
      cinemaMainEl.textContent = 'LOSER';
      cinemaSubEl.textContent = '';
      const dur = audio.siren();
      window.setTimeout(() => {
        if (game.phase !== 'death_reveal') return;
        cinemaSubEl.textContent = 'If you dare, metal jacket... press any key to restart';
        cinemaEl.classList.add('showSub');
        game.cinemaReadyForRestart = true;
      }, dur * 1000 + 120);
    }

    function triggerWin() {
      if (game.phase !== 'gameplay') return;
      clearHeld();
      game.phase = 'win_white';
      game.silentKeyMashes = 0;
      cinemaEl.className = 'show white';
      cinemaMainEl.textContent = '';
      cinemaSubEl.textContent = '';
      audio.setMusic(false);
      audio.stopVoices();
      game.bullets.length = 0;
      game.particles.length = 0;
      game.shells.length = 0;
      syncUI();
    }

    function revealWinLoser() {
      game.phase = 'win_reveal';
      cinemaEl.className = 'show blue';
      cinemaMainEl.textContent = 'LOSER';
      cinemaSubEl.textContent = '';
      const dur = audio.siren();
      window.setTimeout(() => {
        if (game.phase !== 'win_reveal') return;
        cinemaSubEl.textContent = 'The Double FREE CREDIT Slob function was never implemented. Reload browser to try again.';
        cinemaEl.classList.add('showSub');
      }, dur * 1000 + 120);
    }

    function progressIntro(dt) {
      game.intro.scroll += dt * 24;
      if (!game.intro.deploying) {
        game.intro.y = 28 + Math.sin(game.time * 2.1) * 2 + Math.sin(game.time * 0.8) * 3;
      } else {
        game.intro.countdown -= dt;
        const current = Math.ceil(game.intro.countdown);
        countdownEl.textContent = current > 0 ? `${current}...` : 'DEPLOY!';
        game.intro.y += dt * 26;
        if (game.intro.countdown <= -0.25) {
          startGameplay();
        }
      }
    }

    function startGameplay() {
      game.phase = 'gameplay';
      cinemaEl.className = '';
      game.player = makePlayer();
      game.cameraX = 0;
      game.intro.deploying = false;
      game.enemies = [];
      game.bullets = [];
      game.particles = [];
      game.shells = [];
      game.pickups = [];
      for (let i = 0; i < desiredEnemyCount(); i++) spawnEnemy();
      seedPickups();
      puff(game.player.x + 8, GROUND_Y - 3, '#ddd', 12);
      screenShake(4, 0.18);
      audio.setMusic(true);
      syncUI();
    }

    function updateGameplay(dt) {
      const p = game.player;
      p.frame += dt * 12;
      if (p.invuln > 0) p.invuln -= dt;
      if (p.hurtTimer > 0) p.hurtTimer -= dt;
      if (p.slideCooldown > 0) p.slideCooldown -= dt;
      if (p.shotCd > 0) p.shotCd -= dt;
      if (p.shotPose > 0) p.shotPose -= dt;
      if (p.muzzleTimer > 0) p.muzzleTimer -= dt;
      if (p.knifeTimer > 0) p.knifeTimer -= dt;
      if (p.reloadTimer > 0) {
        p.reloadTimer -= dt;
        if (p.reloadTimer <= 0) p.mag = MAG_SIZE;
      }

      const wantsLeft = !!keys.left;
      const wantsRight = !!keys.right;
      const fireHeld = !!keys.fire;

      if (pressed.slide) startSlide();
      if (pressed.knife) startKnife();
      if (pressed.jump && p.onGround && p.slideTimer <= 0) {
        p.vy = JUMP_V;
        p.onGround = false;
        puff(p.x + 10, GROUND_Y - 2, '#d8caa0', 6);
      }

      if (p.slideTimer > 0) {
        p.slideTimer -= dt;
        p.vx = p.facing * 175;
        if (p.slideTimer <= 0) {
          p.vy = JUMP_V * 0.85;
          p.onGround = false;
          puff(p.x + 8, GROUND_Y - 2, '#d8caa0', 5);
        }
      } else {
        if (wantsLeft && !wantsRight) {
          p.vx = -PLAYER_SPEED;
          p.facing = -1;
        } else if (wantsRight && !wantsLeft) {
          p.vx = PLAYER_SPEED;
          p.facing = 1;
        } else {
          p.vx = 0;
        }
      }

      if (fireHeld && !pressed.knife && p.knifeTimer <= 0 && p.slideTimer <= 0 && p.shotCd <= 0) {
        firePlayerBullet();
      }
      if (p.mag <= 0 && p.reloadTimer <= 0) startReload();

      processKnifeHit();

      p.x += p.vx * dt;
      if (!p.onGround) {
        p.vy += GRAVITY * dt;
        p.y += p.vy * dt;
        if (p.y >= GROUND_Y - p.h) {
          p.y = GROUND_Y - p.h;
          p.vy = 0;
          p.onGround = true;
        }
      } else {
        p.y = GROUND_Y - p.h;
      }

      const progressSpeed = AUTO_SCROLL + Math.max(0, p.vx) * 0.62 + (p.slideTimer > 0 && p.facing > 0 ? 18 : 0);
      game.cameraX += progressSpeed * dt;
      p.x = clamp(p.x, game.cameraX + 60, game.cameraX + W - 80);

      game.ambientBoom -= dt;
      if (game.ambientBoom <= 0 && game.cameraX > WORLD_LENGTH * 0.4) {
        const ex = game.cameraX + rand(120, W - 20);
        game.explosions.push({ x: ex, y: rand(100, 150), life: 1.3, maxLife: 1.3, size: rand(16, 28) });
        audio.boom();
        screenShake(3, 0.12);
        game.ambientBoom = rand(2.2, 5.4);
      }

      for (const e of game.enemies) {
        if (e.remove) continue;
        e.anim += dt * 9;
        if (e.flash > 0) e.flash -= dt;
        if (e.swearLock > 0) e.swearLock -= dt;

        if (e.alive) {
          const dx = p.x - e.x;
          e.facing = dx >= 0 ? 1 : -1;
          const stopDist = 48;
          if (Math.abs(dx) > stopDist) e.x += Math.sign(dx) * ENEMY_SPEED * dt;
          e.shootCd -= dt;
          if (e.shootCd <= 0 && Math.abs(dx) < 190) {
            fireEnemyBullet(e);
            e.shootCd = rand(0.75, 1.55);
          }
        } else {
          e.deadTimer -= dt;
          e.vy += 360 * dt;
          e.y += e.vy * dt;
          if (e.y > GROUND_Y - e.h + 10) e.y = GROUND_Y - e.h + 10;
          if (e.deadTimer <= 0) e.remove = true;
        }

        if (e.x < game.cameraX - 160 || e.x > game.cameraX + W + 180) {
          if (e.alive) e.remove = true;
        }
      }
      game.enemies = game.enemies.filter(e => !e.remove);

      ensureChaos();

      for (const b of game.bullets) {
        b.px = b.x;
        b.py = b.y;
        b.x += b.vx * dt;
        b.y += b.vy * dt;
        b.ttl -= dt;
        if (b.from === 'player') {
          for (const e of game.enemies) {
            if (e.alive && hitRectPoint(b.x, b.y, getEnemyHitbox(e))) {
              damageEnemy(e, 1, false);
              b.ttl = -1;
              break;
            }
          }
        } else if (hitRectPoint(b.x, b.y, getPlayerHitbox())) {
          damagePlayer(ENEMY_BULLET_DAMAGE);
          b.ttl = -1;
        }
      }
      game.bullets = game.bullets.filter(b => b.ttl > 0 && b.x > game.cameraX - 60 && b.x < game.cameraX + W + 60 && b.y > -20 && b.y < H + 20);

      for (const s of game.shells) {
        s.life -= dt;
        s.x += s.vx * dt;
        s.y += s.vy * dt;
        s.vy += 240 * dt;
        s.rot += s.vr * dt;
      }
      game.shells = game.shells.filter(s => s.life > 0 && s.y < H + 20);

      for (const pfx of game.particles) {
        pfx.life -= dt;
        pfx.x += pfx.vx * dt;
        pfx.y += pfx.vy * dt;
        pfx.vy += pfx.gravity * dt;
      }
      game.particles = game.particles.filter(pfx => pfx.life > 0);

      for (const ex of game.explosions) ex.life -= dt;
      game.explosions = game.explosions.filter(ex => ex.life > 0);

      for (const pk of game.pickups) {
        pk.sparkle += dt * 8;
        if (pk.taken) continue;
        if (pk.x < game.cameraX - 80) pk.taken = true;
        const hb = getPlayerHitbox();
        const pickBox = { x: pk.x - 5, y: pk.y - 5, w: 10, h: 10 };
        if (overlap(hb, pickBox)) {
          pk.taken = true;
          burstSpark(pk.x, pk.y, choose(['#ffd74f', '#f1f1ff', '#7affb0']), 10);
          audio.coin();
          if (Math.random() < 0.28) triggerHackFlash();
        }
      }
      game.pickups = game.pickups.filter(pk => !pk.taken || pk.x > game.cameraX - 60);

      game.killTimes = game.killTimes.filter(t => game.time - t <= 2);
      if (game.killTimes.length < 3) game.rapidFlags.headshot = false;
      if (game.killTimes.length < 5) game.rapidFlags.annihilation = false;

      if (game.cameraX >= WORLD_LENGTH) triggerWin();
    }

    function update(dt) {
      game.time += dt;
      if (game.announceTimer > 0) {
        game.announceTimer -= dt;
        if (game.announceTimer <= 0) announceEl.classList.remove('visible');
      }
      if (game.hackFlashTimer > 0) {
        game.hackFlashTimer -= dt;
        if (game.hackFlashTimer <= 0) hackFlashEl.classList.remove('visible');
      }
      if (game.shakeTimer > 0) game.shakeTimer -= dt;

      if (game.phase === 'intro' || game.phase === 'countdown') progressIntro(dt);
      else if (game.phase === 'gameplay') updateGameplay(dt);

      syncUI();
      for (const k in pressed) delete pressed[k];
    }

    function stageOfWorld(x) {
      const p = x / WORLD_LENGTH;
      if (p < 0.33) return 0;
      if (p < 0.66) return 1;
      return 2;
    }

    function skyPalette(stage) {
      if (stage === 0) return ['#10203e', '#4d1135', '#e56a26'];
      if (stage === 1) return ['#151c3c', '#2f2140', '#d85e1c'];
      return ['#0b1328', '#2a1629', '#f07b29'];
    }

    function drawBackground() {
      const stage = stageOfWorld(game.cameraX);
      const [top, mid, glow] = skyPalette(stage);
      const grad = ctx.createLinearGradient(0, 0, 0, H);
      grad.addColorStop(0, top);
      grad.addColorStop(0.62, mid);
      grad.addColorStop(1, '#090909');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);

      ctx.fillStyle = 'rgba(255,130,30,.16)';
      ctx.fillRect(0, 136, W, 14);

      const bgOff = game.cameraX * 0.2;
      const cloudOff = game.time * 5 + bgOff * 0.15;
      for (let i = -1; i < 10; i++) {
        const x = ((i * 62 - cloudOff * 0.7) % (W + 80)) - 40;
        const y = 24 + (i % 3) * 14 + Math.sin(game.time + i) * 2;
        ctx.globalAlpha = 0.12;
        ctx.fillStyle = '#e7f2ff';
        ctx.fillRect(x, y, 20, 6);
        ctx.fillRect(x + 6, y - 4, 18, 8);
        ctx.fillRect(x + 18, y + 1, 16, 5);
        ctx.globalAlpha = 1;
      }

      const step = 58;
      for (let row = 0; row < 2; row++) {
        const yBase = row === 0 ? 168 : 178;
        const color = row === 0 ? '#162238' : '#0d1627';
        for (let i = -2; i < Math.ceil(W / step) + 4; i++) {
          const idx = Math.floor(bgOff / step) + i + row * 100;
          const x = i * step - (bgOff % step);
          const peak = 26 + hash(idx) * 32 + row * 14;
          ctx.fillStyle = color;
          ctx.beginPath();
          ctx.moveTo(Math.floor(x), H);
          ctx.lineTo(Math.floor(x + step * 0.45), yBase - peak);
          ctx.lineTo(Math.floor(x + step), H);
          ctx.closePath();
          ctx.fill();
        }
      }

      const skylineOff = game.cameraX * 0.2;
      for (let i = -1; i < Math.ceil(W / 18) + 5; i++) {
        const idx = Math.floor(skylineOff / 18) + i;
        const x = i * 18 - (skylineOff % 18);
        const h = 16 + (hash(idx * 7.3) * 36 | 0);
        ctx.fillStyle = '#0b111f';
        ctx.fillRect(x, 170 - h, 16, h);
        if (hash(idx * 17) > 0.7) {
          ctx.fillStyle = '#ffb12e';
          for (let wy = 0; wy < h - 4; wy += 6) {
            if (hash(idx * 13 + wy) > 0.55) ctx.fillRect(x + 3, 170 - h + 2 + wy, 2, 2);
            if (hash(idx * 23 + wy) > 0.63) ctx.fillRect(x + 8, 170 - h + 2 + wy, 2, 2);
          }
        }
        if (hash(idx * 9.1) > 0.85) {
          ctx.fillStyle = glow;
          ctx.fillRect(x + 5, 170 - h - 3, 6, 3);
          ctx.fillStyle = 'rgba(255,120,40,.22)';
          ctx.fillRect(x + 6, 170 - h - 6, 4, 6);
        }
      }

      for (const ex of game.explosions) {
        const sx = ex.x - game.cameraX * 0.2;
        const t = ex.life / ex.maxLife;
        const size = ex.size * (1 - t * 0.4);
        ctx.globalAlpha = 0.35 * t;
        ctx.fillStyle = '#ffb347';
        ctx.fillRect(sx - size * 0.3, ex.y - size * 0.25, size * 0.6, size * 0.5);
        ctx.fillStyle = '#ffd97a';
        ctx.fillRect(sx - size * 0.15, ex.y - size * 0.12, size * 0.3, size * 0.24);
        ctx.globalAlpha = 0.22 * t;
        ctx.fillStyle = '#6f6f6f';
        ctx.fillRect(sx - size * 0.42, ex.y - size * 0.7, size * 0.84, size * 0.35);
        ctx.globalAlpha = 1;
      }
    }

    function drawMidground() {
      const stage = stageOfWorld(game.cameraX);
      const off = game.cameraX * 0.5;
      const start = Math.floor(off / 40) - 2;
      const count = Math.ceil(W / 40) + 5;

      if (stage === 0) {
        ctx.fillStyle = '#403636';
        for (let i = start; i < start + count; i++) {
          const x = i * 40 - off % 40;
          ctx.fillRect(x, 220, 34, 4);
          ctx.fillStyle = '#7e7060';
          for (let s = 0; s < 4; s++) ctx.fillRect(x + s * 8, 224, 5, 14);
          ctx.fillStyle = '#403636';
          if (hash(i * 4.4) > 0.72) {
            ctx.fillStyle = '#5a4c46';
            ctx.fillRect(x + 10, 194, 16, 18);
            ctx.fillStyle = '#2f2b2a';
            ctx.fillRect(x + 12, 197, 12, 10);
            ctx.fillStyle = '#403636';
          }
          if (hash(i * 5.8) > 0.83) {
            ctx.fillStyle = '#6e5f40';
            ctx.fillRect(x + 16, 186, 6, 34);
            ctx.fillRect(x + 13, 189, 12, 2);
            ctx.fillStyle = '#403636';
          }
        }
      } else if (stage === 1) {
        ctx.fillStyle = '#51606d';
        for (let i = start; i < start + count; i++) {
          const x = i * 40 - off % 40;
          if (i % 2 === 0) {
            ctx.fillRect(x + 18, 180, 3, 40);
            ctx.fillRect(x + 12, 186, 15, 2);
            ctx.fillRect(x + 12, 194, 15, 2);
            ctx.fillRect(x + 12, 202, 15, 2);
          }
          if (hash(i * 2.6) > 0.7) {
            ctx.fillStyle = '#5b4f40';
            ctx.fillRect(x + 6, 196, 22, 16);
            ctx.fillStyle = '#8c7b58';
            ctx.fillRect(x + 8, 198, 18, 12);
            ctx.fillStyle = '#51606d';
          }
          if (hash(i * 6.1) > 0.84) {
            ctx.fillStyle = '#222b34';
            ctx.fillRect(x + 6, 172, 18, 42);
            ctx.fillStyle = '#ffd74f';
            ctx.fillRect(x + 12, 182, 2, 2);
            ctx.fillRect(x + 16, 186, 2, 2);
            ctx.fillStyle = '#51606d';
          }
        }
      } else {
        for (let i = start; i < start + count; i++) {
          const x = i * 40 - off % 40;
          ctx.fillStyle = '#5a4b43';
          if (hash(i * 3.9) > 0.62) {
            ctx.fillRect(x + 8, 196, 18, 18);
            ctx.fillRect(x + 12, 192, 10, 4);
          }
          if (hash(i * 5.4) > 0.78) {
            ctx.fillStyle = '#676767';
            ctx.fillRect(x + 16, 182, 2, 34);
            ctx.fillRect(x + 12, 190, 10, 2);
            ctx.fillStyle = '#5a4b43';
          }
          if (hash(i * 8.3) > 0.82) {
            ctx.fillStyle = '#314247';
            ctx.fillRect(x + 10, 198, 16, 4);
            ctx.fillRect(x + 14, 192, 8, 12);
            ctx.fillStyle = '#5a4b43';
          }
        }
      }
    }

    function drawGround() {
      const stage = stageOfWorld(game.cameraX);
      const off = game.cameraX;
      if (stage === 0) {
        ctx.fillStyle = '#535862';
        ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
        for (let i = -1; i < Math.ceil(W / 64) + 3; i++) {
          const x = i * 64 - off % 64;
          ctx.fillStyle = '#6a7078';
          ctx.fillRect(x, GROUND_Y + 2, 62, 22);
          ctx.fillStyle = '#838992';
          ctx.fillRect(x + 5, GROUND_Y + 4, 12, 2);
          ctx.fillRect(x + 26, GROUND_Y + 4, 12, 2);
          ctx.fillRect(x + 47, GROUND_Y + 4, 12, 2);
          ctx.fillStyle = '#35383f';
          ctx.fillRect(x, GROUND_Y, 64, 2);
          ctx.fillStyle = '#2a221f';
          ctx.fillRect(x, H - 8, 64, 8);
        }
      } else if (stage === 1) {
        ctx.fillStyle = '#655a46';
        ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
        for (let i = -1; i < Math.ceil(W / 32) + 3; i++) {
          const x = i * 32 - off % 32;
          ctx.fillStyle = i % 2 ? '#72654f' : '#625541';
          ctx.fillRect(x, GROUND_Y + 2, 30, 18);
          ctx.fillStyle = '#504330';
          ctx.fillRect(x, GROUND_Y, 32, 2);
          if (hash(i * 6.2) > 0.82) {
            ctx.fillStyle = '#ffbf5a';
            ctx.fillRect(x + 10, GROUND_Y + 6, 12, 2);
            ctx.fillRect(x + 10, GROUND_Y + 10, 12, 2);
          }
        }
      } else {
        ctx.fillStyle = '#4b3426';
        ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
        for (let i = -1; i < Math.ceil(W / 28) + 3; i++) {
          const x = i * 28 - off % 28;
          ctx.fillStyle = i % 2 ? '#62402b' : '#553823';
          ctx.fillRect(x, GROUND_Y + 2, 28, 16);
          ctx.fillStyle = '#3d281b';
          ctx.fillRect(x, GROUND_Y, 28, 2);
          if (hash(i * 4.2) > 0.72) {
            ctx.fillStyle = '#2d1d14';
            ctx.fillRect(x + 6, GROUND_Y + 6, 12, 5);
          }
        }
      }
    }

    function drawPickup(pk) {
      const sx = pk.x - game.cameraX;
      const y = pk.y + Math.sin(game.time * 6 + pk.phase) * 2;
      const flip = Math.sin(game.time * 8 + pk.phase);
      if (pk.type === 'coin') {
        ctx.fillStyle = '#f7d04b';
        ctx.fillRect(sx - 3, y - 4, Math.max(1, Math.abs(flip) * 6 | 0), 8);
        ctx.fillStyle = '#fff1a6';
        ctx.fillRect(sx - 1, y - 3, 2, 6);
      } else if (pk.type === 'medal') {
        ctx.fillStyle = '#d5c9ff';
        ctx.fillRect(sx - 4, y - 4, 8, 8);
        ctx.fillStyle = '#ffe562';
        ctx.fillRect(sx - 2, y - 2, 4, 4);
      } else {
        ctx.fillStyle = '#7affb0';
        ctx.fillRect(sx - 2, y - 4, 4, 8);
        ctx.fillRect(sx - 4, y - 2, 8, 4);
        ctx.fillStyle = '#d2fff0';
        ctx.fillRect(sx - 1, y - 1, 2, 2);
      }
      if (((pk.sparkle * 6) | 0) % 4 === 0) {
        ctx.fillStyle = '#fff';
        ctx.fillRect(sx + 4, y - 5, 1, 1);
      }
    }

    function drawBullet(b) {
      const sx = b.x - game.cameraX;
      const sy = b.y;
      ctx.strokeStyle = b.from === 'player' ? '#fff8aa' : '#ffa86d';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(Math.floor(b.px - game.cameraX), Math.floor(b.py));
      ctx.lineTo(Math.floor(sx), Math.floor(sy));
      ctx.stroke();
      ctx.fillStyle = b.from === 'player' ? '#fff' : '#ff6e3b';
      ctx.fillRect(sx - 1, sy - 1, 2, 2);
    }

    function drawShell(s) {
      const sx = s.x - game.cameraX;
      ctx.save();
      ctx.translate(sx, s.y);
      ctx.rotate(s.rot);
      ctx.fillStyle = '#f8d060';
      ctx.fillRect(-2, -1, 4, 2);
      ctx.restore();
    }

    function drawParticle(pfx) {
      const sx = pfx.x - game.cameraX;
      const alpha = clamp(pfx.life / pfx.maxLife, 0, 1);
      ctx.globalAlpha = alpha;
      ctx.fillStyle = pfx.color;
      ctx.fillRect(sx - pfx.size / 2, pfx.y - pfx.size / 2, pfx.size, pfx.size);
      ctx.globalAlpha = 1;
    }

    function drawKnifeArc(x, y, facing, progress) {
      const sx = x - game.cameraX;
      const ox = facing > 0 ? 14 : 10;
      const arcX = sx + (facing > 0 ? ox : -ox - 12);
      const arcY = y + 14 - progress * 6;
      ctx.fillStyle = '#d4fbff';
      for (let i = 0; i < 5; i++) {
        ctx.fillRect(arcX + facing * i * 4, arcY + (i % 2 === 0 ? -i : i), 6 - i, 1);
      }
    }

    function drawMuzzle(x, y, facing) {
      const sx = x - game.cameraX;
      const baseX = facing > 0 ? sx : sx - 8;
      ctx.fillStyle = '#fff7b2';
      ctx.fillRect(baseX, y - 2, 8, 2);
      ctx.fillRect(baseX + 2, y - 4, 4, 6);
      ctx.fillStyle = '#ff9b32';
      ctx.fillRect(baseX + (facing > 0 ? 5 : 0), y - 1, 4, 2);
    }

    function drawAleck(x, y, facing, state, anim, shotPose, muzzleOn, hurtFlash = 0) {
      const sx = Math.floor(x - game.cameraX);
      ctx.save();
      ctx.translate(sx, Math.floor(y));
      if (facing < 0) {
        ctx.scale(-1, 1);
        ctx.translate(-24, 0);
      }

      const frame = Math.floor(anim) % 6;
      let leg1 = 0, leg2 = 0, armBack = 0, armFront = 0, bodyBob = 0, crouch = 0;
      if (state === 'idle') {
        bodyBob = Math.sin(game.time * 3.8) * 1.2;
        armFront = Math.sin(game.time * 3.8) * 0.6;
      } else if (state === 'run') {
        const cycle = [0, 2, 0, -2, 0, 2][frame];
        leg1 = cycle;
        leg2 = -cycle;
        armBack = -cycle * 0.5;
        armFront = cycle * 0.5;
        bodyBob = Math.abs(cycle) * -0.4;
      } else if (state === 'jump_up') {
        leg1 = -3;
        leg2 = 2;
        armBack = -1;
        armFront = 1;
        bodyBob = -1;
      } else if (state === 'jump_apex') {
        leg1 = -1;
        leg2 = 1;
        armBack = -1;
        armFront = 0;
        bodyBob = -2;
      } else if (state === 'jump_down') {
        leg1 = 2;
        leg2 = -2;
        armBack = 1;
        armFront = 1;
        bodyBob = 0;
      } else if (state === 'knife') {
        armFront = -4;
        bodyBob = -1;
      } else if (state === 'slide') {
        crouch = 20;
      } else if (state === 'parachute') {
        bodyBob = Math.sin(game.time * 3) * 1.5;
        leg1 = 1;
        leg2 = -1;
      }

      if (state === 'slide') {
        const flash = hurtFlash > 0 && ((game.time * 40) | 0) % 2 === 0;
        const skin = flash ? '#fff' : '#6f4531';
        const cloth = flash ? '#fff' : '#4f5b39';
        const dark = flash ? '#fff' : '#202428';
        const red = flash ? '#fff' : '#a92b22';
        ctx.fillStyle = dark;
        ctx.fillRect(1, 30, 18, 6);
        ctx.fillRect(16, 28, 8, 4);
        ctx.fillRect(18, 32, 6, 4);
        ctx.fillStyle = cloth;
        ctx.fillRect(5, 24, 14, 6);
        ctx.fillStyle = '#e0b95a';
        ctx.fillRect(9, 24, 2, 6);
        ctx.fillRect(12, 24, 2, 6);
        ctx.fillStyle = skin;
        ctx.fillRect(0, 24, 6, 6);
        ctx.fillStyle = red;
        ctx.fillRect(1, 22, 4, 2);
        ctx.fillStyle = dark;
        ctx.fillRect(18, 26, 10, 2);
        ctx.fillRect(26, 25, 6, 1);
      } else {
        const flash = hurtFlash > 0 && ((game.time * 40) | 0) % 2 === 0;
        const skin = flash ? '#fff' : '#6f4531';
        const cloth = flash ? '#fff' : '#55623b';
        const dark = flash ? '#fff' : '#202428';
        const band = flash ? '#fff' : '#a92b22';
        const boot = dark;
        const strap = '#e0b95a';
        const bob = bodyBob | 0;
        ctx.fillStyle = boot;
        ctx.fillRect(7, 38 + leg1 + bob, 4, 8);
        ctx.fillRect(13, 38 + leg2 + bob, 4, 8);
        ctx.fillStyle = cloth;
        ctx.fillRect(7, 28 + leg1 + bob, 4, 10);
        ctx.fillRect(13, 28 + leg2 + bob, 4, 10);
        ctx.fillRect(6, 14 + bob, 12, 14);
        ctx.fillStyle = strap;
        ctx.fillRect(8, 15 + bob, 2, 14);
        ctx.fillRect(12, 17 + bob, 2, 12);
        ctx.fillStyle = dark;
        ctx.fillRect(4, 18 + armBack + bob, 3, 11);
        ctx.fillRect(17, 18 + armFront + bob, 3, 11);
        ctx.fillRect(17, 20 + armFront + bob, 10, 3);
        ctx.fillRect(26, 19 + armFront + bob, 6, 1);
        if (shotPose > 0) {
          ctx.fillRect(16, 19 + bob, 8, 3);
          ctx.fillRect(23, 18 + bob, 7, 1);
        }
        ctx.fillStyle = skin;
        ctx.fillRect(7, 4 + bob, 10, 10);
        ctx.fillStyle = band;
        ctx.fillRect(7, 4 + bob, 10, 2);
        ctx.fillStyle = '#2a1a14';
        ctx.fillRect(7, 12 + bob, 10, 2);
        ctx.fillStyle = '#e8f2ff';
        ctx.fillRect(9, 8 + bob, 2, 1);
        ctx.fillRect(13, 8 + bob, 2, 1);
      }
      ctx.restore();

      if (state === 'knife') {
        const prog = 1 - game.player.knifeTimer / KNIFE_TIME;
        if (prog > 0.1 && prog < 0.6) drawKnifeArc(x, y, facing, prog);
      }
      if (muzzleOn) {
        const mx = facing > 0 ? x + 25 : x - 7;
        drawMuzzle(mx, y + (state === 'slide' ? 26 : 20), facing);
      }
    }

    function drawEnemy(e) {
      if (!e.alive) {
        const t = 1 - e.deadTimer / e.deathDur;
        const blinkCycle = Math.floor(t * e.blinkCount * 6);
        if (blinkCycle % 2 === 1) return;
      }

      const sx = Math.floor(e.x - game.cameraX);
      ctx.save();
      ctx.translate(sx, Math.floor(e.y));
      if (e.facing < 0) {
        ctx.scale(-1, 1);
        ctx.translate(-22, 0);
      }

      if (!e.alive) {
        const t = 1 - e.deadTimer / e.deathDur;
        ctx.translate(11, 40);
        ctx.rotate(-t * 0.9);
        ctx.translate(-11, -40);
      }

      const flash = e.flash > 0 && ((game.time * 50) | 0) % 2 === 0;
      const skin = flash ? '#fff' : '#98aa95';
      const cloth = flash ? '#fff' : '#5a6241';
      const dark = flash ? '#fff' : '#22272b';
      const eye = flash ? '#111' : '#9dff6c';
      const frame = Math.floor(e.anim) % 6;
      const cycle = e.alive ? [0, 2, 0, -2, 0, 2][frame] : 0;
      const bodyBob = e.alive ? Math.abs(cycle) * -0.3 : 0;

      ctx.fillStyle = dark;
      ctx.fillRect(6, 39 + cycle, 4, 7);
      ctx.fillRect(12, 39 - cycle, 4, 7);
      ctx.fillStyle = cloth;
      ctx.fillRect(6, 29 + cycle, 4, 10);
      ctx.fillRect(12, 29 - cycle, 4, 10);
      ctx.fillRect(5, 14 + bodyBob, 12, 15);
      ctx.fillStyle = '#4f583a';
      ctx.fillRect(7, 16 + bodyBob, 8, 2);
      ctx.fillStyle = dark;
      ctx.fillRect(3, 19 - cycle * 0.4 + bodyBob, 3, 10);
      ctx.fillRect(17, 19 + cycle * 0.4 + bodyBob, 3, 10);
      ctx.fillRect(16, 21 + bodyBob, 8, 3);
      ctx.fillRect(23, 20 + bodyBob, 5, 1);
      ctx.fillStyle = skin;
      ctx.fillRect(6, 4 + bodyBob, 10, 10);
      ctx.fillStyle = '#364239';
      ctx.fillRect(6, 4 + bodyBob, 10, 2);
      ctx.fillStyle = eye;
      ctx.fillRect(8, 8 + bodyBob, 2, 1);
      ctx.fillRect(12, 8 + bodyBob, 2, 1);
      ctx.fillStyle = '#263122';
      ctx.fillRect(9, 12 + bodyBob, 4, 1);
      ctx.restore();
    }

    function playerState() {
      if (game.phase === 'intro' || game.phase === 'countdown') return 'parachute';
      const p = game.player;
      if (p.slideTimer > 0) return 'slide';
      if (p.knifeTimer > 0) return 'knife';
      if (!p.onGround) {
        if (p.vy < -35) return 'jump_up';
        if (p.vy > 50) return 'jump_down';
        return 'jump_apex';
      }
      if (Math.abs(p.vx) > 8) return 'run';
      return 'idle';
    }

    function drawParachute(x, y) {
      const sx = x - game.cameraX;
      const canopyY = y - 26;
      ctx.fillStyle = '#d8e2ef';
      ctx.fillRect(sx - 14, canopyY, 28, 4);
      ctx.fillRect(sx - 18, canopyY + 4, 36, 3);
      ctx.fillRect(sx - 12, canopyY - 2, 24, 2);
      ctx.fillStyle = '#ff7b4d';
      ctx.fillRect(sx - 10, canopyY + 4, 8, 3);
      ctx.fillRect(sx + 2, canopyY + 4, 8, 3);
      ctx.strokeStyle = 'rgba(230, 244, 255, .8)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(sx - 10, canopyY + 7);
      ctx.lineTo(sx - 2, y + 6);
      ctx.moveTo(sx - 2, canopyY + 7);
      ctx.lineTo(sx + 3, y + 6);
      ctx.moveTo(sx + 6, canopyY + 7);
      ctx.lineTo(sx + 8, y + 6);
      ctx.moveTo(sx + 14, canopyY + 7);
      ctx.lineTo(sx + 12, y + 6);
      ctx.stroke();
    }

    function drawIntroScene() {
      const grad = ctx.createLinearGradient(0, 0, 0, H);
      grad.addColorStop(0, '#205ea8');
      grad.addColorStop(0.55, '#6aa5ff');
      grad.addColorStop(1, '#f0a34d');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);

      ctx.fillStyle = 'rgba(255,255,255,.16)';
      const off = game.intro.scroll * 24;
      for (let i = -1; i < 8; i++) {
        const x = ((i * 84 - off * 0.7) % (W + 120)) - 40;
        const y = 24 + (i % 4) * 22 + Math.sin(game.time + i) * 2;
        ctx.fillRect(x, y, 26, 7);
        ctx.fillRect(x + 10, y - 5, 28, 9);
        ctx.fillRect(x + 24, y + 2, 20, 6);
      }

      ctx.fillStyle = 'rgba(255, 156, 66, .2)';
      ctx.fillRect(0, 170, W, 18);

      for (let i = -2; i < 13; i++) {
        const x = i * 44 - (off * 0.5 % 44);
        const h = 18 + (hash(i * 4.2) * 28 | 0);
        ctx.fillStyle = '#304d7a';
        ctx.beginPath();
        ctx.moveTo(x, H);
        ctx.lineTo(x + 22, 176 - h);
        ctx.lineTo(x + 44, H);
        ctx.closePath();
        ctx.fill();
      }

      for (let i = -1; i < Math.ceil(W / 88) + 3; i++) {
        const x = i * 88 - (off * 1.7 % 88);
        ctx.fillStyle = '#4e5667';
        ctx.fillRect(x, GROUND_Y + 4, 80, 40);
        ctx.fillStyle = '#636b7d';
        ctx.fillRect(x + 3, GROUND_Y + 4, 74, 8);
        ctx.fillStyle = '#222830';
        ctx.fillRect(x + 6, GROUND_Y + 14, 16, 10);
        ctx.fillRect(x + 30, GROUND_Y + 14, 16, 10);
        ctx.fillRect(x + 54, GROUND_Y + 14, 16, 10);
        ctx.fillStyle = '#ffcc62';
        ctx.fillRect(x + 10, GROUND_Y + 18, 3, 2);
        ctx.fillRect(x + 34, GROUND_Y + 18, 3, 2);
        ctx.fillRect(x + 58, GROUND_Y + 18, 3, 2);
      }

      ctx.fillStyle = '#2b1d18';
      ctx.fillRect(0, H - 8, W, 8);

      if (game.intro.chute) drawParachute(game.intro.x, game.intro.y);
      drawAleck(game.intro.x, game.intro.y, 1, 'parachute', game.time * 8, 0, false, 0);
    }

    function drawGameplayScene() {
      drawBackground();
      drawMidground();
      drawGround();

      for (const pk of game.pickups) if (!pk.taken && pk.x > game.cameraX - 20 && pk.x < game.cameraX + W + 20) drawPickup(pk);
      for (const s of game.shells) drawShell(s);
      for (const e of game.enemies) if (e.x > game.cameraX - 30 && e.x < game.cameraX + W + 30) drawEnemy(e);

      const p = game.player;
      drawAleck(p.x, p.y, p.facing, playerState(), p.frame, p.shotPose, p.muzzleTimer > 0, p.hurtTimer);

      for (const b of game.bullets) drawBullet(b);
      for (const pfx of game.particles) drawParticle(pfx);

      if (p.hurtTimer > 0) {
        ctx.fillStyle = `rgba(255, 42, 42, ${0.18 * (p.hurtTimer / 0.22)})`;
        ctx.fillRect(0, 0, W, H);
      }
    }

    function render() {
      ctx.clearRect(0, 0, W, H);
      const shakeX = game.shakeTimer > 0 ? rand(-game.shakeMag, game.shakeMag) : 0;
      const shakeY = game.shakeTimer > 0 ? rand(-game.shakeMag * 0.5, game.shakeMag * 0.5) : 0;
      ctx.save();
      ctx.translate(shakeX | 0, shakeY | 0);
      if (game.phase === 'intro' || game.phase === 'countdown') drawIntroScene();
      else drawGameplayScene();
      ctx.restore();
    }

    function handleIntroAction(action) {
      if (game.intro.deploying) return;
      const expected = ['left', 'right', 'jump'][game.intro.progress];
      if (action === expected) {
        game.intro.progress++;
        audio.coin();
        syncDeploySequence();
        if (game.intro.progress >= 3) {
          game.phase = 'countdown';
          game.intro.deploying = true;
          game.intro.countdown = 5;
          game.intro.chute = false;
          countdownEl.textContent = '5...';
          burstSpark(game.intro.x, game.intro.y, '#d8f4ff', 12);
          puff(game.intro.x, game.intro.y, '#eff4ff', 10);
          showAnnouncement('DEPLOY!', '#d8f4ff', 0.7);
        }
      } else if (action === 'left') {
        game.intro.progress = 1;
        audio.coin();
        syncDeploySequence();
      } else if (action === 'right' || action === 'jump') {
        game.intro.progress = 0;
        syncDeploySequence();
      }
    }

    function handleCinemaKey() {
      if (game.phase === 'death_black') {
        game.silentKeyMashes++;
        if (game.silentKeyMashes >= 6) revealDeathLoser();
      } else if (game.phase === 'win_white') {
        game.silentKeyMashes++;
        if (game.silentKeyMashes >= 6) revealWinLoser();
      } else if (game.phase === 'death_reveal') {
        if (game.cinemaReadyForRestart) resetGame();
      }
    }

    function actionFromKey(e) {
      const k = e.key.toLowerCase();
      if (k === 'arrowleft' || k === 'a') return 'left';
      if (k === 'arrowright' || k === 'd') return 'right';
      if (k === ' ' || k === 'spacebar') return 'jump';
      if (k === 'control' || k === 'q') return 'knife';
      if (k === 'shift') return 'slide';
      if (k === 'z' || k === 'j' || k === 'f' || k === 'x' || k === 'enter') return 'fire';
      return null;
    }

    function preventGameKey(e) {
      const blocked = ['ArrowLeft', 'ArrowRight', ' ', 'Spacebar', 'Shift', 'Control', 'a', 'd', 'q', 'z', 'j', 'f', 'x', 'Enter'];
      if (blocked.includes(e.key) || blocked.includes(e.key.toLowerCase())) e.preventDefault();
    }

    window.addEventListener('keydown', e => {
      audio.unlock();
      preventGameKey(e);
      if (e.repeat && game.phase !== 'gameplay') return;

      if (game.phase === 'death_black' || game.phase === 'win_white' || game.phase === 'death_reveal' || game.phase === 'win_reveal') {
        if (!e.repeat) handleCinemaKey();
        return;
      }

      const action = actionFromKey(e);
      if (!action) return;

      if (game.phase === 'intro' || game.phase === 'countdown') {
        if (!e.repeat) handleIntroAction(action);
        return;
      }

      if (game.phase !== 'gameplay') return;
      keys[action] = true;
      if (!e.repeat) pressed[action] = true;
    }, { passive: false });

    window.addEventListener('keyup', e => {
      const action = actionFromKey(e);
      if (!action) return;
      keys[action] = false;
    }, { passive: false });

    window.addEventListener('mousedown', e => {
      audio.unlock();
      if (game.phase === 'gameplay') {
        keys.fire = true;
        pressed.fire = true;
      }
      e.preventDefault();
    }, { passive: false });

    window.addEventListener('mouseup', () => {
      keys.fire = false;
    });

    window.addEventListener('blur', () => {
      clearHeld();
    });

    canvas.addEventListener('contextmenu', e => e.preventDefault());

    function loop(now) {
      const dt = Math.min(0.033, (now - game.lastTime) / 1000 || 0.016);
      game.lastTime = now;
      update(dt);
      render();
      requestAnimationFrame(loop);
    }

    resetGame();
    requestAnimationFrame(loop);
  })();
  </script>
</body>
